    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

// ── STORAGE ───────────────────────────────────────────────────────────────────
const todayKey=()=>new Date().toISOString().slice(0,10);
const fmtDate=d=>new Date(d+"T12:00:00").toLocaleDateString("nl-NL",{day:"numeric",month:"short"});
const fmtDateLong=d=>new Date(d+"T12:00:00").toLocaleDateString("nl-NL",{day:"numeric",month:"long",year:"numeric"});
function lsGet(k,fb=null){try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):fb}catch{return fb}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}

function getExHistory(exId){
  const all=lsGet("pf_ex",{});
  return(all[exId]||[]).sort((a,b)=>b.date.localeCompare(a.date));
}
function saveExSets(exId,sets){
  const all=lsGet("pf_ex",{});
  if(!all[exId])all[exId]=[];
  all[exId]=[{date:todayKey(),sets},...all[exId].filter(e=>e.date!==todayKey())].slice(0,60);
  lsSet("pf_ex",all);
}
function getTodaySets(exId){
  return getExHistory(exId).find(x=>x.date===todayKey())?.sets||null;
}
function getAllTimePR(exId){
  let pr=0;
  getExHistory(exId).forEach(h=>h.sets.forEach(s=>{const w=parseFloat(s.weight)||0;if(w>pr)pr=w;}));
  return pr;
}

// ── AUDIO ─────────────────────────────────────────────────────────────────────
let _actx=null;
function getActx(){
  if(!_actx)_actx=new(window.AudioContext||window.webkitAudioContext)();
  return _actx;
}
function unlockAudio(){
  try{
    const ctx=getActx();
    const buf=ctx.createBuffer(1,1,22050);
    const src=ctx.createBufferSource();
    src.buffer=buf;src.connect(ctx.destination);src.start(0);
    if(ctx.state==="suspended")ctx.resume();
  }catch{}
}
function playBeep(){
  try{
    const ctx=getActx();
    if(ctx.state==="suspended")ctx.resume();
    [0,0.22,0.44].forEach(delay=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=900;o.type="sine";
      const t=ctx.currentTime+delay;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.5,t+0.01);
      g.gain.linearRampToValueAtTime(0,t+0.18);
      o.start(t);o.stop(t+0.2);
    });
  }catch{}
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function getYearPct(){
  const now=new Date(),start=new Date(now.getFullYear(),0,1),end=new Date(now.getFullYear()+1,0,1);
  return((now-start)/(end-start)*100).toFixed(1);
}
function getDailyQuote(){
  const day=Math.floor((Date.now()-new Date(new Date().getFullYear(),0,1))/86400000);
  return QUOTES[day%QUOTES.length];
}

// ── SPARKLINE ─────────────────────────────────────────────────────────────────
function Sparkline({data,color,w=64,h=28}){
  if(!data||data.length<2)return null;
  const max=Math.max(...data),min=Math.min(...data),range=max-min||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-((v-min)/range)*(h-6)-3}`).join(" ");
  const last=pts.split(" ").pop().split(",");
  return(<svg width={w} height={h}><polyline points={pts} fill="none" stroke={color} strokeWidth={2} strokeLinejoin="round" strokeLinecap="round" opacity={0.9}/><circle cx={last[0]} cy={last[1]} r={3} fill={color}/></svg>);
}

    const valid=sets.filter(s=>s.weight!==""||s.reps!=="");

          </div>
          <div style={{fontSize:11,color:"#555",marginTop:3}}>{[ex.detail,ex.sets].filter(Boolean).join(" · ")}</div>
        </div>
        <div style={{display:"flex",gap:6,marginBottom:18}}>
          {[["log","Log sets"],["history","Progressie"]].map(([t,label])=>(
            <button key={t} onClick={()=>setTab(t)} style={{flex:1,padding:"8px 0",borderRadius:10,background:tab===t?dayColor+"20":"#1a1a1e",border:`1px solid ${tab===t?dayColor+"60":"#2a2a2e"}`,color:tab===t?dayColor:"#555",fontSize:11,textTransform:"uppercase",letterSpacing:"0.05em"}}>{label}</button>
          ))}
        </div>
        {tab==="log"?(
          <>
            {hist.length>0&&(
              <div style={{marginBottom:14,padding:"12px 14px",borderRadius:12,background:"#0d0d0f",border:"1px solid #1e1e22"}}>
                <div style={{fontSize:10,color:"#555",marginBottom:8}}>Vorige · {fmtDate(hist[0].date)}</div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {hist[0].sets.map((s,i)=><div key={i} style={{fontSize:11,color:dayColor,background:dayColor+"18",padding:"4px 10px",borderRadius:7,fontFamily:"'DM Mono',monospace"}}>{s.weight}kg × {s.reps}</div>)}
                </div>
              </div>
            )}
            {isPR&&<div style={{marginBottom:14,padding:"12px",borderRadius:12,background:"#fbbf2410",border:"1px solid #fbbf2440",textAlign:"center",fontSize:13,color:"#fbbf24",fontFamily:"'Syne',sans-serif",fontWeight:800}}>🏆 Nieuw PR!</div>}
            <div style={{display:"flex",gap:8,marginBottom:6,paddingLeft:28}}>
              <div style={{flex:2,fontSize:10,color:"#444",textAlign:"center",textTransform:"uppercase",letterSpacing:"0.08em"}}>kg</div>

            </div>
            <div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:12}}>
              {sets.map((s,idx)=>(
                <div key={idx} style={{display:"flex",alignItems:"center",gap:8}}>

                  <input type="number" inputMode="numeric" placeholder="—" value={s.reps} onChange={e=>setSets(ss=>ss.map((x,i)=>i===idx?{...x,reps:e.target.value}:x))} style={{flex:2,background:"#1a1a1e",border:`1px solid ${s.reps?dayColor+"50":"#2a2a2e"}`,borderRadius:9,padding:"11px 8px",color:"#fff",fontSize:16,fontFamily:"'DM Mono',monospace",outline:"none",textAlign:"center"}}/>

                </div>

            <button onClick={()=>setSets(ss=>[...ss,{weight:"",reps:""}])} style={{width:"100%",padding:"9px 0",borderRadius:10,background:"transparent",border:"1px dashed #2a2a2e",color:"#555",fontSize:11,marginBottom:14}}>+ set toevoegen</button>
            <button onClick={handleSave} style={{width:"100%",padding:"15px 0",borderRadius:13,background:saved?"#a3e635":dayColor,color:"#000",fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:15,transition:"background 0.2s"}}>{saved?"✓ Opgeslagen!":"Opslaan"}</button>

        ):(
          <div>
            {hist.length===0?<div style={{color:"#444",fontSize:12,textAlign:"center",padding:"32px 0"}}>Nog geen sessies. Log je eerste sets!</div>:(
              <>

                      <div style={{fontSize:10,marginTop:3,color:sparkData[sparkData.length-1]>sparkData[0]?"#a3e635":"#f87171"}}>

// ── BODY WEIGHT MODAL ─────────────────────────────────────────────────────────
function BodyWeightModal({onClose}){
  const [weight,setWeight]=useState("");

    const w=parseFloat(weight);if(!w)return;

    setSaved(true);setTimeout(onClose,600);

  const latest=history[0],prev=history[1];
  const diff=latest&&prev?(latest.w-prev.w).toFixed(1):null;

    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:300,backdropFilter:"blur(8px)"}}>

// ── REST TIMER ────────────────────────────────────────────────────────────────
function RestTimer(){
  const PRESETS=[30,60,90,120];
  const [custom,setCustom]=useState(120);
  const [running,setRunning]=useState(false);
  const [done,setDone]=useState(false);
  const [display,setDisplay]=useState(120);
  const startTimeRef=useRef(null);
  const durationRef=useRef(120);
  const rafRef=useRef(null);

  function tick(){
    if(!startTimeRef.current)return;
    const elapsed=(Date.now()-startTimeRef.current)/1000;
    const remaining=Math.max(0,durationRef.current-elapsed);
    setDisplay(Math.ceil(remaining));
    if(remaining<=0){
      setRunning(false);setDone(true);
      startTimeRef.current=null;
      playBeep();
      return;
    }
    rafRef.current=requestAnimationFrame(tick);
  }

  function start(){
    unlockAudio();
    startTimeRef.current=Date.now();
    durationRef.current=display>0?display:custom;
    setDone(false);setRunning(true);
    rafRef.current=requestAnimationFrame(tick);
  }
  function pause(){
    durationRef.current=display;
    startTimeRef.current=null;
    cancelAnimationFrame(rafRef.current);
    setRunning(false);
  }
  function reset(){
    cancelAnimationFrame(rafRef.current);
    startTimeRef.current=null;
    setRunning(false);setDone(false);setDisplay(custom);
  }
  function pickPreset(p){
    cancelAnimationFrame(rafRef.current);
    startTimeRef.current=null;
    setCustom(p);setDisplay(p);setRunning(false);setDone(false);
  }

  useEffect(()=>{
    if(running)rafRef.current=requestAnimationFrame(tick);
    return()=>cancelAnimationFrame(rafRef.current);
  },[running]);

  const pct=display/custom;
  const r=44,circ=2*Math.PI*r;
  const color=done?"#a3e635":pct>0.5?"#38bdf8":pct>0.2?"#fb923c":"#f87171";
  const mins=Math.floor(display/60),secs=display%60;

  return(
    <div className="card">
      <div className="label" style={{marginBottom:16}}>Rest Timer</div>
      <div style={{display:"flex",gap:6,marginBottom:18}}>
        {PRESETS.map(p=>(
          <button key={p} onClick={()=>pickPreset(p)} style={{flex:1,padding:"7px 0",borderRadius:9,background:custom===p?"#38bdf820":"#1a1a1e",border:`1px solid ${custom===p?"#38bdf860":"#2a2a2e"}`,color:custom===p?"#38bdf8":"#555",fontSize:10}}>
            {p<60?`${p}s`:`${p/60}min`}
          </button>
        ))}
      </div>
      <div style={{display:"flex",alignItems:"center",gap:20}}>
        <div style={{position:"relative",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <svg width={100} height={100} style={{transform:"rotate(-90deg)"}}>
            <circle cx={50} cy={50} r={r} fill="none" stroke="#1e1e22" strokeWidth={8}/>
            <circle cx={50} cy={50} r={r} fill="none" stroke={color} strokeWidth={8} strokeDasharray={`${Math.max(0,pct)*circ} ${circ}`} strokeLinecap="round"/>
          </svg>
          <div style={{position:"absolute",fontFamily:"'Syne',sans-serif",fontSize:20,fontWeight:800,color:done?"#a3e635":"#fff",letterSpacing:"-1px"}}>
            {done?"✓":`${mins}:${String(secs).padStart(2,"0")}`}
          </div>
        </div>
        <div style={{flex:1,display:"flex",flexDirection:"column",gap:8}}>
          <div style={{display:"flex",gap:8}}>
            {!running
              ?<button onClick={start} style={{flex:1,padding:"10px 0",borderRadius:10,background:done?"#a3e63520":"#38bdf820",border:`1px solid ${done?"#a3e63550":"#38bdf850"}`,color:done?"#a3e635":"#38bdf8",fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:13}}>{done?"Again":display===custom?"Start":"Resume"}</button>
              :<button onClick={pause} style={{flex:1,padding:"10px 0",borderRadius:10,background:"#fb923c20",border:"1px solid #fb923c50",color:"#fb923c",fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:13}}>Pause</button>
            }
            <button onClick={reset} style={{padding:"10px 14px",borderRadius:10,background:"transparent",border:"1px solid #2a2a2e",color:"#555",fontSize:12}}>↺</button>
          </div>
          <div style={{fontSize:10,color:"#444"}}>{done?"Done — get back to it 💪":running?"Resting...":"Tap Start na je set"}</div>
        </div>
      </div>
    </div>
  );
}

  });

// ── CALENDAR ──────────────────────────────────────────────────────────────────
function CalendarTab(){
  const [viewDate,setViewDate]=useState(new Date());
  const year=viewDate.getFullYear(),month=viewDate.getMonth();
  const monthName=viewDate.toLocaleDateString("nl-NL",{month:"long",year:"numeric"});
  const firstDay=new Date(year,month,1).getDay();
  const offset=(firstDay+6)%7; // Mon=0
  const daysInMonth=new Date(year,month+1,0).getDate();

  const trainedDays=lsGet("pf_calendar",{});
  const today=new Date();
  const todayStr=today.toISOString().slice(0,10);

  function toggleDay(dateStr){
    const updated={...trainedDays,[dateStr]:!trainedDays[dateStr]};
    lsSet("pf_calendar",updated);
    // Force re-render
    setViewDate(new Date(viewDate));
  }

  function prevMonth(){const d=new Date(year,month-1,1);setViewDate(d);}
  function nextMonth(){const d=new Date(year,month+1,1);setViewDate(d);}

  const days=[];
  for(let i=0;i<offset;i++)days.push(null);
  for(let i=1;i<=daysInMonth;i++)days.push(i);

  const trainedCount=Object.entries(trainedDays).filter(([k,v])=>v&&k.startsWith(`${year}-${String(month+1).padStart(2,"0")}`)).length;

  // Get trained muscles from logged exercises this month
  const monthStr=`${year}-${String(month+1).padStart(2,"0")}`;
  const all=lsGet("pf_ex",{});
  const dayMuscles={};
  ALL_EXERCISES.forEach(ex=>{
    const hist=all[ex.id]||[];
    hist.filter(h=>h.date.startsWith(monthStr)).forEach(h=>{
      if(!dayMuscles[h.date])dayMuscles[h.date]=new Set();
      dayMuscles[h.date].add(ex.muscle);
    });
  });

  return(
    <div className="fade-up">
      <div className="card">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <button onClick={prevMonth} style={{background:"transparent",border:"1px solid #2a2a2e",color:"#555",borderRadius:8,padding:"6px 12px",fontSize:14}}>‹</button>
          <div style={{fontFamily:"'Syne',sans-serif",fontSize:15,fontWeight:800,color:"#fff",textTransform:"capitalize"}}>{monthName}</div>
          <button onClick={nextMonth} style={{background:"transparent",border:"1px solid #2a2a2e",color:"#555",borderRadius:8,padding:"6px 12px",fontSize:14}}>›</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:8}}>
          {["M","D","W","D","V","Z","Z"].map((d,i)=>(
            <div key={i} style={{textAlign:"center",fontSize:9,color:"#555",padding:"4px 0"}}>{d}</div>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
          {days.map((day,i)=>{
            if(!day)return<div key={`e${i}`}/>;
            const dateStr=`${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
            const isTrained=trainedDays[dateStr]||dayMuscles[dateStr]?.size>0;
            const isToday=dateStr===todayStr;
            const isFuture=new Date(dateStr)>today;
            const muscles=dayMuscles[dateStr]?[...dayMuscles[dateStr]]:[];
            const dotColor=muscles.length>0?MUSCLE_COLORS[muscles[0]]:"#a3e635";
            return(
              <div key={dateStr} onClick={()=>!isFuture&&toggleDay(dateStr)} style={{aspectRatio:"1",borderRadius:10,background:isTrained?"#a3e63518":"#1a1a1e",border:`1px solid ${isToday?"#a3e635":isTrained?"#a3e63540":"#2a2a2e"}`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:isFuture?"default":"pointer",gap:2,opacity:isFuture?0.3:1}}>
                <div style={{fontSize:11,color:isToday?"#a3e635":isTrained?"#e8e8e8":"#555",fontFamily:"'Syne',sans-serif",fontWeight:isToday?800:400}}>{day}</div>
                {isTrained&&<div style={{width:4,height:4,borderRadius:"50%",background:dotColor}}/>}
              </div>
            );
          })}
        </div>
        <div style={{marginTop:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:11,color:"#555"}}>{trainedCount} dagen getraind</div>
          <div style={{fontSize:11,color:"#a3e635"}}>{daysInMonth>0?Math.round(trainedCount/Math.min(today.getDate(),daysInMonth)*100):0}% van de maand</div>
        </div>
      </div>

      <VolumeTracker/>
      <PRPage/>
    </div>
  );
}

  const yearPct=getYearPct();
  const quote=getDailyQuote();
  const size=110,stroke=9,r=(size-stroke)/2,circ=2*Math.PI*r;
  const ringColor=dayPct>=1?"#a3e635":dayPct>=0.5?"#38bdf8":"#fb923c";

  const streak=useMemo(()=>{
    const hist=lsGet("pf_week_history",{});
    const weeks=Object.keys(hist).sort((a,b)=>b.localeCompare(a));
    let s=0;
    for(const wk of weeks){const cnt=Object.values(hist[wk]||{}).filter(Boolean).length;if(cnt>=3)s++;else break;}
    return s;
  },[weekDone]);

  function loadWeights(idx){
    const exs=WORKOUTS[DAYS[idx]]||[];
    const w={};
    exs.forEach(ex=>{
      const h=getExHistory(ex.id).filter(x=>x.date!==todayKey());
      if(h.length>0){const mx=Math.max(...h[0].sets.map(s=>parseFloat(s.weight)||0));if(mx>0)w[ex.id]=mx;}
    });
    setLastWeights(w);
  }
  useEffect(()=>{loadWeights(splitIdx);},[splitIdx]);

  const sleepOptions=[
    {key:"good",label:"Goed",emoji:"😴",color:"#a3e635"},
    {key:"ok",label:"Oké",emoji:"😐",color:"#fb923c"},
    {key:"bad",label:"Slecht",emoji:"😫",color:"#f87171"},
  ];

  return(
    <div className="fade-up">
      {/* Header with ring */}
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",marginBottom:20,paddingTop:4}}>
        <div style={{position:"relative",display:"flex",alignItems:"center",justifyContent:"center",marginBottom:12}}>
          <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
            <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#1e1e22" strokeWidth={stroke}/>
            <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={ringColor} strokeWidth={stroke} strokeDasharray={`${Math.min(dayPct,1)*circ} ${circ}`} strokeLinecap="round" style={{transition:"stroke-dasharray 0.8s cubic-bezier(.4,0,.2,1)"}}/>
          </svg>
          <div style={{position:"absolute",textAlign:"center"}}>
            <div style={{fontFamily:"'Syne',sans-serif",fontSize:24,fontWeight:800,color:ringColor,letterSpacing:"-2px",lineHeight:1}}>{Math.round(dayPct*100)}%</div>
            <div style={{fontSize:8,color:"#555",letterSpacing:"0.1em",textTransform:"uppercase",marginTop:2}}>dag</div>
          </div>
        </div>
        <div style={{textAlign:"center"}}>
          <div style={{fontFamily:"'Syne',sans-serif",fontSize:19,fontWeight:800,color:"#fff",letterSpacing:"-0.3px"}}>
            {dayPct>=1?"Dag voltooid 🏆":restDay?"Rustdag 💤":"Pim Augustijn"}
          </div>
          <div style={{color:"#555",fontSize:11,marginTop:3}}>{dayName} · {dateStr}</div>
        </div>
        <div style={{display:"flex",gap:8,marginTop:10}}>
          {streak>0&&<div style={{fontSize:10,color:"#fb923c",background:"#fb923c15",border:"1px solid #fb923c30",borderRadius:8,padding:"4px 10px"}}>🔥 {streak}w</div>}
        </div>
      </div>

      {/* Quote + Year */}
      <div className="card" style={{background:"linear-gradient(135deg,#141416 0%,#1c1c20 100%)"}}>
        <div style={{fontSize:12,color:"#e8e8e8",fontFamily:"'Syne',sans-serif",fontWeight:700,lineHeight:1.6,marginBottom:14,fontStyle:"italic"}}>"{quote}"</div>
        <div>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
            <div className="label">2026</div>
            <div style={{fontSize:10,color:"#a3e635"}}>{yearPct}%</div>
          </div>
          <div style={{height:3,background:"#1e1e22",borderRadius:2}}>
            <div style={{height:"100%",borderRadius:2,background:"linear-gradient(90deg,#a3e635,#38bdf8)",width:`${yearPct}%`}}/>
          </div>
        </div>
      </div>

      {/* Workout */}
      <div className="card">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div className="label">Vandaag</div>
          <button onClick={()=>setRestDay(r=>!r)} style={{background:restDay?"#2a2a2e":"transparent",border:"1px solid #2a2a2e",color:restDay?"#a3e635":"#555",borderRadius:6,padding:"4px 10px",fontSize:10}}>{restDay?"✓ Rustdag":"Rustdag"}</button>
        </div>
        {!restDay?(
          <>
            <div style={{fontFamily:"'Syne',sans-serif",fontSize:26,fontWeight:800,color:currentDayColor,letterSpacing:"-1px",marginBottom:14}}>{DAYS[splitIdx]}</div>
            <div style={{display:"flex",gap:7,marginBottom:16}}>
              {DAYS.map((d,i)=>(
                <button key={d} onClick={()=>setSplitIdx(i)} style={{flex:1,padding:"8px 4px",borderRadius:10,background:i===splitIdx?DAY_COLORS[i]+"20":"#1a1a1e",border:`1px solid ${i===splitIdx?DAY_COLORS[i]+"60":"#2a2a2e"}`,color:i===splitIdx?DAY_COLORS[i]:"#444",fontSize:9,letterSpacing:"0.05em",textTransform:"uppercase",whiteSpace:"pre-line"}}>{d.replace(" ","\n")}</button>
              ))}
            </div>
            <div style={{marginBottom:16}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                <div style={{fontSize:10,color:"#555"}}>voortgang</div>
                <div style={{fontSize:10,color:doneCount===exercises.length&&exercises.length>0?currentDayColor:"#555"}}>{doneCount}/{exercises.length}</div>
              </div>
              <div style={{height:3,background:"#1e1e22",borderRadius:2}}>
                <div style={{height:"100%",borderRadius:2,background:currentDayColor,width:`${exercises.length?(doneCount/exercises.length)*100:0}%`,transition:"width 0.4s ease"}}/>
              </div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {exercises.map(ex=>{
                const done=!!exDone[ex.id];
                const lw=lastWeights[ex.id];
                const pr=getAllTimePR(ex.id);
                return(
                  <div key={ex.id} style={{display:"flex",alignItems:"center",gap:10,padding:"11px 12px",borderRadius:12,background:done?currentDayColor+"08":"#0d0d0f",border:`1px solid ${done?currentDayColor+"30":"#1e1e22"}`,transition:"all 0.15s ease"}}>
                    <div onClick={()=>setExDone(p=>({...p,[ex.id]:!p[ex.id]}))} style={{minWidth:20,height:20,borderRadius:6,border:`1.5px solid ${done?currentDayColor:"#3a3a40"}`,background:done?currentDayColor:"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#000",fontWeight:700,flexShrink:0,cursor:"pointer"}}>{done?"✓":""}</div>
                    <div style={{flex:1,cursor:"pointer"}} onClick={()=>setActiveEx(ex)}>
                      <div style={{fontSize:12,color:done?"#555":"#e8e8e8",fontFamily:"'Syne',sans-serif",fontWeight:700,textDecoration:done?"line-through":"none"}}>
                        {ex.name}{pr>0&&lw&&lw>=pr&&<span style={{fontSize:9,color:"#fbbf24",marginLeft:5}}>🏆</span>}
                      </div>
                      <div style={{fontSize:10,color:"#3a3a40",marginTop:2}}>
                        {[ex.detail,ex.sets].filter(Boolean).join(" · ")}
                        {lw&&<span style={{color:currentDayColor+"90"}}> · {lw}kg</span>}
                      </div>
                    </div>
                    <button onClick={()=>setActiveEx(ex)} style={{padding:"5px 11px",borderRadius:8,flexShrink:0,background:"transparent",border:`1px solid ${currentDayColor}35`,color:currentDayColor+"cc",fontSize:10}}>log</button>
                  </div>
                );
              })}
            </div>

            {/* Session note */}
            <div style={{marginTop:14}}>
              <div className="label" style={{marginBottom:8}}>Sessie notitie</div>
              <textarea value={note} onChange={e=>setNote(e.target.value)} placeholder="Hoe voelde de training? Zwaar, goed, moe..." rows={2}
                style={{width:"100%",background:"#0d0d0f",border:"1px solid #1e1e22",borderRadius:10,padding:"10px 12px",color:"#888",fontSize:12,lineHeight:1.5}}/>
            </div>
          </>
        ):(
          <div>
            <div style={{color:"#555",fontFamily:"'Syne',sans-serif",fontSize:20,fontWeight:700,marginBottom:16}}>Rest & Recover 💤</div>
            <div className="label" style={{marginBottom:8}}>Notitie</div>
            <textarea value={note} onChange={e=>setNote(e.target.value)} placeholder="Hoe voel je je vandaag?" rows={2}
              style={{width:"100%",background:"#0d0d0f",border:"1px solid #1e1e22",borderRadius:10,padding:"10px 12px",color:"#888",fontSize:12,lineHeight:1.5}}/>
          </div>
        )}
      </div>

      {/* Week */}
      <div className="card">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div className="label">Week</div>
          <button onClick={()=>setShowWeekHist(true)} style={{background:"transparent",border:"1px solid #2a2a2e",color:"#555",borderRadius:6,padding:"4px 10px",fontSize:10}}>geschiedenis</button>
        </div>
        <div style={{display:"flex",gap:6}}>
          {WEEK.map(d=>{
            const isToday=d===todayShort,done=weekDone[d];
            return(
              <div key={d} onClick={()=>setWeekDone(w=>({...w,[d]:!w[d]}))} style={{flex:1,aspectRatio:"1",borderRadius:10,background:done?"#a3e63520":"#1a1a1e",border:`1px solid ${isToday?"#a3e635":done?"#a3e63540":"#2a2a2e"}`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",gap:3}}>
                <div style={{fontSize:8,color:isToday?"#a3e635":"#444"}}>{d}</div>
                <div style={{fontSize:14}}>{done?"✓":"·"}</div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Rest Timer */}
      <RestTimer/>

      {/* Sleep */}
      <div className="card">
        <div className="label" style={{marginBottom:14}}>Slaap</div>
        <div style={{display:"flex",gap:8}}>
          {sleepOptions.map(o=>(
            <button key={o.key} onClick={()=>setSleepScore(prev=>prev===o.key?null:o.key)} style={{flex:1,padding:"14px 8px",borderRadius:12,background:sleepScore===o.key?o.color+"20":"#0d0d0f",border:`1px solid ${sleepScore===o.key?o.color+"60":"#1e1e22"}`,display:"flex",flexDirection:"column",alignItems:"center",gap:6,transition:"all 0.15s ease"}}>
              <div style={{fontSize:22}}>{o.emoji}</div>
              <div style={{fontSize:10,color:sleepScore===o.key?o.color:"#555",letterSpacing:"0.05em"}}>{o.label}</div>
            </button>
          ))}
        </div>
      </div>

      {/* Supplements */}
      <div className="card">
        <div className="label" style={{marginBottom:14}}>Supplementen</div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {SUPPLEMENTS.map(s=>{
            const done=!!supps[s.id];
            return(
              <div key={s.id} onClick={()=>setSupps(p=>({...p,[s.id]:!p[s.id]}))} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 14px",borderRadius:12,background:done?"#a3e63508":"#0d0d0f",border:`1px solid ${done?"#a3e63530":"#1e1e22"}`,cursor:"pointer",transition:"all 0.15s ease"}}>
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <div style={{width:20,height:20,borderRadius:6,border:`1.5px solid ${done?"#a3e635":"#3a3a40"}`,background:done?"#a3e635":"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#000"}}>{done?"✓":""}</div>
                  <div>
                    <div style={{fontSize:13,color:done?"#e8e8e8":"#888",fontFamily:"'Syne',sans-serif",fontWeight:700}}>{s.label}</div>
                    <div style={{fontSize:10,color:"#444"}}>{s.dose}</div>
                  </div>
                </div>
                <div style={{width:6,height:6,borderRadius:"50%",background:done?"#a3e635":"#2a2a2e"}}/>
              </div>
            );
          })}
        </div>
        <div style={{marginTop:12,padding:"9px 14px",borderRadius:10,background:"#0d0d0f",border:"1px solid #1e1e22"}}>
          <div style={{fontSize:10,color:"#555"}}>{suppCount}/{SUPPLEMENTS.length} genomen vandaag</div>
        </div>
      </div>

      {activeEx&&<ExerciseModal ex={activeEx} dayColor={currentDayColor} onClose={()=>{setActiveEx(null);loadWeights(splitIdx);}}/>}
      {showWeekHist&&<WeekHistoryModal onClose={()=>setShowWeekHist(false)}/>}
    </div>
  );
}

// ── WEEK HISTORY ──────────────────────────────────────────────────────────────
function WeekHistoryModal({onClose}){
  const history=lsGet("pf_week_history",{});
  const weeks=Object.keys(history).sort((a,b)=>b.localeCompare(a)).slice(0,12);
  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:300,backdropFilter:"blur(8px)"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#141416",border:"1px solid #2a2a2e",borderRadius:"22px 22px 0 0",padding:"8px 20px 40px",width:"100%",maxWidth:480,maxHeight:"80vh",overflowY:"auto"}}>
        <div style={{width:36,height:4,background:"#2a2a2e",borderRadius:2,margin:"14px auto 20px"}}/>
        <div style={{fontFamily:"'Syne',sans-serif",fontSize:18,fontWeight:800,color:"#fff",marginBottom:20}}>Week Geschiedenis</div>
        {weeks.length===0?<div style={{color:"#444",fontSize:12,textAlign:"center",padding:"30px 0"}}>Nog geen weekdata.</div>:(
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {weeks.map(wk=>{
              const days=history[wk]||{};
              const count=Object.values(days).filter(Boolean).length;
              return(
                <div key={wk} style={{padding:"14px 16px",borderRadius:14,background:"#0d0d0f",border:"1px solid #1e1e22"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                    <div style={{fontSize:11,color:"#888",fontFamily:"'Syne',sans-serif",fontWeight:700}}>Week {wk}</div>
                    <div style={{fontSize:10,color:count>=4?"#a3e635":count>=2?"#fb923c":"#555"}}>{count}/7 dagen</div>
                  </div>
                  <div style={{display:"flex",gap:5}}>
                    {WEEK.map(d=>(
                      <div key={d} style={{flex:1,aspectRatio:"1",borderRadius:8,background:days[d]?"#a3e63520":"#1a1a1e",border:`1px solid ${days[d]?"#a3e63540":"#2a2a2e"}`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2}}>
                        <div style={{fontSize:7,color:"#444"}}>{d}</div>
                        <div style={{fontSize:12}}>{days[d]?"✓":"·"}</div>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

// ── MAIN ──────────────────────────────────────────────────────────────────────
const TABS=[
  {id:"today",label:"Vandaag",icon:(active)=>(
    <svg width={22} height={22} viewBox="0 0 24 24" fill="none" stroke={active?"#a3e635":"#555"} strokeWidth={2} strokeLinecap="round">
      <rect x={3} y={4} width={18} height={18} rx={3}/><line x1={16} y1={2} x2={16} y2={6}/><line x1={8} y1={2} x2={8} y2={6}/><line x1={3} y1={10} x2={21} y2={10}/>
    </svg>
  )},
  {id:"stats",label:"Stats",icon:(active)=>(
    <svg width={22} height={22} viewBox="0 0 24 24" fill="none" stroke={active?"#38bdf8":"#555"} strokeWidth={2} strokeLinecap="round">
      <path d="M12 2a7 7 0 1 0 0 14A7 7 0 0 0 12 2z"/><line x1={12} y1={16} x2={12} y2={22}/><line x1={8} y1={22} x2={16} y2={22}/>
    </svg>
  )},
  {id:"calendar",label:"Kalender",icon:(active)=>(
    <svg width={22} height={22} viewBox="0 0 24 24" fill="none" stroke={active?"#f472b6":"#555"} strokeWidth={2} strokeLinecap="round">
      <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
    </svg>
  )},
];

const TAB_ACTIVE_COLORS={"today":"#a3e635","stats":"#38bdf8","calendar":"#f472b6"};

function App(){
  const [tab,setTab]=useState("today");
  return(
    <div id="root">
      <div className="scroll-area">
        {tab==="today"&&<TodayTab/>}
        {tab==="stats"&&<StatsTab/>}
        {tab==="calendar"&&<CalendarTab/>}
      </div>
      <div className="tab-bar">
        {TABS.map(t=>(
          <button key={t.id} className="tab-btn" onClick={()=>setTab(t.id)}>
            {t.icon(tab===t.id)}
            <div style={{fontSize:9,color:tab===t.id?TAB_ACTIVE_COLORS[t.id]:"#555",letterSpacing:"0.05em",textTransform:"uppercase"}}>{t.label}</div>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
