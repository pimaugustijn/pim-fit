<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Pim Fit"/>

  <title>Pim Fit</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{height:100%}
    body{height:100%;background:#0a0a0c;font-family:'DM Mono',monospace;color:#e8e8e8;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
    ::-webkit-scrollbar{width:0}
    input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
    input[type=range]{-webkit-appearance:none;height:3px;background:#2a2a2e;border-radius:2px;outline:none;width:100%}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:#a3e635}
    button{-webkit-tap-highlight-color:transparent;font-family:inherit;border:none;cursor:pointer;background:transparent}
    textarea{font-family:'DM Mono',monospace;resize:none;outline:none}
    #root{height:100%;position:fixed;width:100%;top:0;left:0}
    .app-shell{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto}
    .page{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px 8px;padding-top:max(16px,env(safe-area-inset-top))}
    .tabbar{display:flex;background:#0d0d0f;border-top:1px solid #1e1e22;padding-bottom:max(12px,env(safe-area-inset-bottom));flex-shrink:0}
    .tabbtn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 0 6px;gap:3px;cursor:pointer}
    .card{background:#111113;border:1px solid #1e1e22;border-radius:18px;padding:18px;margin-bottom:12px}
    .lbl{font-size:10px;color:#555;letter-spacing:.12em;text-transform:uppercase}
    @keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .fu{animation:fu 0.25s ease both}
  </style>
</head>
<body>
<div id="root"></div>

// ─── STORAGE ──────────────────────────────────────────────────────────────────
const todayKey=()=>new Date().toISOString().slice(0,10);
const fmtDate=d=>new Date(d+"T12:00:00").toLocaleDateString("nl-NL",{day:"numeric",month:"short"});
function lsGet(k,fb=null){try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):fb}catch{return fb}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
function getExHist(id){const a=lsGet("pf_ex",{});return(a[id]||[]).sort((a,b)=>b.date.localeCompare(a.date))}
function saveExSets(id,sets){const a=lsGet("pf_ex",{});if(!a[id])a[id]=[];a[id]=[{date:todayKey(),sets},...a[id].filter(e=>e.date!==todayKey())].slice(0,60);lsSet("pf_ex",a)}
function getTodaySets(id){return getExHist(id).find(x=>x.date===todayKey())?.sets||null}
function getPR(id){let pr=0;getExHist(id).forEach(h=>h.sets.forEach(s=>{const w=parseFloat(s.weight)||0;if(w>pr)pr=w;}));return pr}

// ─── AUDIO ────────────────────────────────────────────────────────────────────
let _actx=null;
function getActx(){if(!_actx)_actx=new(window.AudioContext||window.webkitAudioContext)();return _actx}
function unlockAudio(){try{const c=getActx(),b=c.createBuffer(1,1,22050),s=c.createBufferSource();s.buffer=b;s.connect(c.destination);s.start(0);if(c.state==="suspended")c.resume()}catch{}}
function playBeep(){try{const c=getActx();if(c.state==="suspended")c.resume();[0,.22,.44].forEach(d=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=900;o.type="sine";const t=c.currentTime+d;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.5,t+.01);g.gain.linearRampToValueAtTime(0,t+.18);o.start(t);o.stop(t+.2)})}catch{}}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
const getYearPct=()=>{const n=new Date(),s=new Date(n.getFullYear(),0,1),e=new Date(n.getFullYear()+1,0,1);return((n-s)/(e-s)*100).toFixed(1)};
const getDailyQuote=()=>QUOTES[Math.floor((Date.now()-new Date(new Date().getFullYear(),0,1))/86400000)%QUOTES.length];

// ─── SPARKLINE ────────────────────────────────────────────────────────────────
function Sparkline({data,color,w=64,h=26}){
  if(!data||data.length<2)return null;
  const max=Math.max(...data),min=Math.min(...data),rng=max-min||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-((v-min)/rng)*(h-6)-3}`).join(" ");
  const lp=pts.split(" ").pop().split(",");
  return <svg width={w} height={h}><polyline points={pts} fill="none" stroke={color} strokeWidth={2} strokeLinejoin="round" strokeLinecap="round"/><circle cx={lp[0]} cy={lp[1]} r={3} fill={color}/></svg>;
}

// ─── RING ─────────────────────────────────────────────────────────────────────
function Ring({pct,color,size=100,stroke=8}){
  const r=(size-stroke)/2,c=2*Math.PI*r;
  return <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}><circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#1e1e22" strokeWidth={stroke}/><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={`${Math.min(pct,1)*c} ${c}`} strokeLinecap="round" style={{transition:"stroke-dasharray .8s cubic-bezier(.4,0,.2,1)"}}/></svg>;
}

// ─── EXERCISE MODAL ───────────────────────────────────────────────────────────
function ExModal({ex,dayColor,onClose}){
  const hist=getExHist(ex.id).filter(h=>h.date!==todayKey());
  const saved0=getTodaySets(ex.id);
  const pr=getPR(ex.id);
  const [sets,setSets]=useState(saved0||[{weight:"",reps:""},{weight:"",reps:""}]);
  const [tab,setTab]=useState("log");
  const [ok,setOk]=useState(false);
  const [newPR,setNewPR]=useState(false);
  const spark=[...hist].reverse().map(h=>Math.max(...h.sets.map(s=>parseFloat(s.weight)||0))).filter(v=>v>0);

  function save(){
    const v=sets.filter(s=>s.weight||s.reps);
    if(v.length){const mx=Math.max(...v.map(s=>parseFloat(s.weight)||0));if(mx>pr&&pr>0)setNewPR(true);saveExSets(ex.id,v);}
    setOk(true);setTimeout(onClose,700);
  }

  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:400,backdropFilter:"blur(8px)",padding:"20px 16px"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#141416",border:"1px solid #2a2a2e",borderRadius:20,padding:"20px 20px 28px",width:"100%",maxWidth:480,maxHeight:"80vh",overflowY:"auto"}}>
        <div style={{width:36,height:4,background:"#2a2a2e",borderRadius:2,margin:"0 auto 16px"}}/>
        <div style={{marginBottom:14}}>
          <div style={{fontFamily:"'Syne',sans-serif",fontSize:18,fontWeight:800,color:"#fff"}}>
            {ex.name}
            {pr>0&&<span style={{fontSize:9,color:"#fbbf24",background:"#fbbf2415",border:"1px solid #fbbf2430",padding:"2px 7px",borderRadius:5,marginLeft:8}}>PR {pr}kg</span>}
          </div>
          <div style={{fontSize:11,color:"#555",marginTop:2}}>{[ex.detail,ex.sets].filter(Boolean).join(" · ")}</div>
        </div>
        <div style={{display:"flex",gap:6,marginBottom:16}}>
          {[["log","Log sets"],["hist","Progressie"]].map(([t,l])=>(
            <button key={t} onClick={()=>setTab(t)} style={{flex:1,padding:"8px 0",borderRadius:10,background:tab===t?dayColor+"20":"#1a1a1e",border:`1px solid ${tab===t?dayColor+"60":"#2a2a2e"}`,color:tab===t?dayColor:"#555",fontSize:11,textTransform:"uppercase",letterSpacing:".05em"}}>{l}</button>
          ))}
        </div>
        {tab==="log"?(
          <>
            {hist.length>0&&<div style={{marginBottom:12,padding:"11px 13px",borderRadius:12,background:"#0d0d0f",border:"1px solid #1e1e22"}}>
              <div style={{fontSize:10,color:"#555",marginBottom:7}}>Vorige · {fmtDate(hist[0].date)}</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{hist[0].sets.map((s,i)=><div key={i} style={{fontSize:11,color:dayColor,background:dayColor+"18",padding:"3px 9px",borderRadius:6}}>{s.weight}kg × {s.reps}</div>)}</div>
            </div>}
            {newPR&&<div style={{marginBottom:12,padding:"11px",borderRadius:12,background:"#fbbf2410",border:"1px solid #fbbf2440",textAlign:"center",fontSize:13,color:"#fbbf24",fontFamily:"'Syne',sans-serif",fontWeight:800}}>🏆 Nieuw PR!</div>}
            <div style={{display:"flex",gap:8,marginBottom:5,paddingLeft:26}}>
              <div style={{flex:2,fontSize:10,color:"#444",textAlign:"center",textTransform:"uppercase",letterSpacing:".08em"}}>kg</div>
              <div style={{flex:2,fontSize:10,color:"#444",textAlign:"center",textTransform:"uppercase",letterSpacing:".08em"}}>reps</div>
              <div style={{width:28}}/>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:10}}>
              {sets.map((s,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{fontSize:11,color:"#444",width:20,textAlign:"right",flexShrink:0}}>{i+1}</div>
                  <input type="number" inputMode="decimal" placeholder="—" value={s.weight} onChange={e=>setSets(ss=>ss.map((x,j)=>j===i?{...x,weight:e.target.value}:x))} style={{flex:2,background:"#1a1a1e",border:`1px solid ${s.weight?dayColor+"50":"#2a2a2e"}`,borderRadius:9,padding:"10px 8px",color:"#fff",fontSize:16,outline:"none",textAlign:"center"}}/>
                  <input type="number" inputMode="numeric" placeholder="—" value={s.reps} onChange={e=>setSets(ss=>ss.map((x,j)=>j===i?{...x,reps:e.target.value}:x))} style={{flex:2,background:"#1a1a1e",border:`1px solid ${s.reps?dayColor+"50":"#2a2a2e"}`,borderRadius:9,padding:"10px 8px",color:"#fff",fontSize:16,outline:"none",textAlign:"center"}}/>
                  <button onClick={()=>sets.length>1&&setSets(ss=>ss.filter((_,j)=>j!==i))} style={{width:28,height:28,borderRadius:7,border:"1px solid #2a2a2e",color:"#444",fontSize:13,flexShrink:0}}>×</button>
                </div>
              ))}
            </div>
            <button onClick={()=>setSets(ss=>[...ss,{weight:"",reps:""}])} style={{width:"100%",padding:"8px 0",borderRadius:10,border:"1px dashed #2a2a2e",color:"#555",fontSize:11,marginBottom:12}}>+ set toevoegen</button>
            <button onClick={save} style={{width:"100%",padding:"14px 0",borderRadius:13,background:ok?"#a3e635":dayColor,color:"#000",fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:15,transition:"background .2s"}}>{ok?"✓ Opgeslagen!":"Opslaan"}</button>
          </>
        ):(
          hist.length===0?<div style={{color:"#444",fontSize:12,textAlign:"center",padding:"28px 0"}}>Nog geen sessies. Log je eerste sets!</div>:(
            <>
              {spark.length>=2&&<div style={{marginBottom:14,padding:"14px",borderRadius:14,background:"#0d0d0f",border:"1px solid #1e1e22",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div>
                  <div style={{fontSize:10,color:"#555",textTransform:"uppercase",letterSpacing:".08em",marginBottom:5}}>Max gewicht</div>
                  <div style={{fontFamily:"'Syne',sans-serif",fontSize:24,fontWeight:800,color:dayColor,letterSpacing:"-1px"}}>{Math.max(...spark)}kg</div>
                  <div style={{fontSize:10,marginTop:2,color:spark[spark.length-1]>spark[0]?"#a3e635":"#f87171"}}>{spark[spark.length-1]>spark[0]?`▲ +${(spark[spark.length-1]-spark[0]).toFixed(1)}`:`▼ ${(spark[spark.length-1]-spark[0]).toFixed(1)}`}kg</div>
                </div>
                <Sparkline data={spark} color={dayColor}/>
              </div>}
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {hist.slice(0,10).map((h,i)=>(
                  <div key={i} style={{padding:"11px 13px",borderRadius:12,background:"#0d0d0f",border:`1px solid ${i===0?dayColor+"30":"#1e1e22"}`}}>
                    <div style={{fontSize:10,color:i===0?dayColor:"#555",marginBottom:7}}>{i===0?"Laatste · ":""}{fmtDate(h.date)}</div>
                    <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>{h.sets.map((s,j)=><div key={j} style={{fontSize:11,color:i===0?dayColor:"#777",background:i===0?dayColor+"15":"#1a1a1e",padding:"3px 9px",borderRadius:6}}>{s.weight}kg × {s.reps}</div>)}</div>
                  </div>
                ))}
              </div>
            </>
          )
        )}
      </div>
    </div>
  );
}

// ─── WEEK HISTORY MODAL ───────────────────────────────────────────────────────
function WeekHistModal({onClose}){
  const hist=lsGet("pf_week_history",{});
  const weeks=Object.keys(hist).sort((a,b)=>b.localeCompare(a)).slice(0,12);
  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:400,backdropFilter:"blur(8px)",padding:"20px 16px"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#141416",border:"1px solid #2a2a2e",borderRadius:20,padding:"20px 20px 28px",width:"100%",maxWidth:480,maxHeight:"80vh",overflowY:"auto"}}>
        <div style={{width:36,height:4,background:"#2a2a2e",borderRadius:2,margin:"0 auto 16px"}}/>
        <div style={{fontFamily:"'Syne',sans-serif",fontSize:18,fontWeight:800,color:"#fff",marginBottom:18}}>Week Geschiedenis</div>

          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {weeks.map(wk=>{
              const d=hist[wk]||{};
              const cnt=Object.values(d).filter(Boolean).length;
              return(
                <div key={wk} style={{padding:"13px 15px",borderRadius:14,background:"#0d0d0f",border:"1px solid #1e1e22"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:9}}>
                    <div style={{fontSize:11,color:"#888",fontFamily:"'Syne',sans-serif",fontWeight:700}}>Week {wk}</div>
                    <div style={{fontSize:10,color:cnt>=4?"#a3e635":cnt>=2?"#fb923c":"#555"}}>{cnt}/7</div>

        )}

}

// ─── BODY WEIGHT MODAL ────────────────────────────────────────────────────────
function BWModal({onClose}){
  const [w,setW]=useState("");
  const [ok,setOk]=useState(false);
  const [hist,setHist]=useState(()=>lsGet("pf_bw",[]));
  const spark=[...hist].reverse().slice(-14).map(h=>h.w);
  function save(){const n=parseFloat(w);if(!n)return;const u=[{date:todayKey(),w:n},...hist.filter(h=>h.date!==todayKey())].slice(0,90);lsSet("pf_bw",u);setHist(u);setOk(true);setTimeout(onClose,600)}
  const latest=hist[0],prev=hist[1];
  const diff=latest&&prev?(latest.w-prev.w).toFixed(1):null;
  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:400,backdropFilter:"blur(8px)",padding:"20px 16px"}}>

// ─── REST TIMER ───────────────────────────────────────────────────────────────
function RestTimer(){
  const PRESETS=[30,60,90,120];
  const [custom,setCustom]=useState(120);
  const [display,setDisplay]=useState(120);
  const [running,setRunning]=useState(false);
  const [done,setDone]=useState(false);
  const startRef=useRef(null);
  const durRef=useRef(120);
  const rafRef=useRef(null);

  function tick(){
    if(!startRef.current)return;
    const rem=Math.max(0,durRef.current-(Date.now()-startRef.current)/1000);
    setDisplay(Math.ceil(rem));
    if(rem<=0){setRunning(false);setDone(true);startRef.current=null;playBeep();return;}
    rafRef.current=requestAnimationFrame(tick);
  }
  function start(){unlockAudio();startRef.current=Date.now();durRef.current=display>0?display:custom;setDone(false);setRunning(true)}
  function pause(){durRef.current=display;startRef.current=null;cancelAnimationFrame(rafRef.current);setRunning(false)}
  function reset(){cancelAnimationFrame(rafRef.current);startRef.current=null;setRunning(false);setDone(false);setDisplay(custom)}
  function pick(p){cancelAnimationFrame(rafRef.current);startRef.current=null;setCustom(p);setDisplay(p);setRunning(false);setDone(false)}

  useEffect(()=>{if(running){rafRef.current=requestAnimationFrame(tick)}return()=>cancelAnimationFrame(rafRef.current)},[running]);

  const pct=display/custom;
  const color=done?"#a3e635":pct>.5?"#38bdf8":pct>.2?"#fb923c":"#f87171";
  const m=Math.floor(display/60),s=display%60;

  return(
    <div className="card">
      <div className="lbl" style={{marginBottom:14}}>Rest Timer</div>
      <div style={{display:"flex",gap:6,marginBottom:16}}>
        {PRESETS.map(p=><button key={p} onClick={()=>pick(p)} style={{flex:1,padding:"7px 0",borderRadius:9,background:custom===p?"#38bdf820":"#1a1a1e",border:`1px solid ${custom===p?"#38bdf860":"#2a2a2e"}`,color:custom===p?"#38bdf8":"#555",fontSize:10}}>{p<60?`${p}s`:`${p/60}min`}</button>)}
      </div>
      <div style={{display:"flex",alignItems:"center",gap:18}}>
        <div style={{position:"relative",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          <Ring pct={pct} color={color} size={96} stroke={8}/>
          <div style={{position:"absolute",fontFamily:"'Syne',sans-serif",fontSize:18,fontWeight:800,color:done?"#a3e635":"#fff",letterSpacing:"-1px"}}>{done?"✓":`${m}:${String(s).padStart(2,"0")}`}</div>
        </div>
        <div style={{flex:1,display:"flex",flexDirection:"column",gap:8}}>
          <div style={{display:"flex",gap:8}}>
            {!running
              ?<button onClick={start} style={{flex:1,padding:"10px 0",borderRadius:10,background:done?"#a3e63520":"#38bdf820",border:`1px solid ${done?"#a3e63550":"#38bdf850"}`,color:done?"#a3e635":"#38bdf8",fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:13}}>{done?"Again":display===custom?"Start":"Resume"}</button>
              :<button onClick={pause} style={{flex:1,padding:"10px 0",borderRadius:10,background:"#fb923c20",border:"1px solid #fb923c50",color:"#fb923c",fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:13}}>Pause</button>
            }
            <button onClick={reset} style={{padding:"10px 13px",borderRadius:10,border:"1px solid #2a2a2e",color:"#555",fontSize:12}}>↺</button>
          </div>
          <div style={{fontSize:10,color:"#444"}}>{done?"Done — get back to it 💪":running?"Resting...":"Tap Start na je set"}</div>
        </div>
      </div>
    </div>
  );
}

// ─── STATS TAB ────────────────────────────────────────────────────────────────
function StatsTab(){
  const [showBW,setShowBW]=useState(false);
  const bwHist=lsGet("pf_bw",[]);
  const spark=[...bwHist].reverse().slice(-14).map(h=>h.w);

  // Volume this week
  const weekStart=new Date();
  weekStart.setDate(weekStart.getDate()-((weekStart.getDay()+6)%7));
  const weekDays=Array.from({length:7},(_,i)=>{const d=new Date(weekStart);d.setDate(d.getDate()+i);return d.toISOString().slice(0,10)});
  const all=lsGet("pf_ex",{});
  const volByMuscle={};
  ALL_EX.forEach(ex=>{
    const hist=all[ex.id]||[];
    const tw=hist.filter(h=>weekDays.includes(h.date));
    if(tw.length){
      // Only count sets that actually have weight or reps filled in
      const realSets=tw.reduce((a,s)=>a+s.sets.filter(x=>x.weight||x.reps).length,0);
      if(realSets>0){
        if(!volByMuscle[ex.muscle])volByMuscle[ex.muscle]=0;
        volByMuscle[ex.muscle]+=realSets;
      }
    }
  });

  const TARGETS={chest:6,back:8,shoulders:8,biceps:6,triceps:6,quads:8,hamstrings:4,glutes:4,calves:4,core:3};
  const muscles=Object.keys(TARGETS);

  // PRs
  const prs=ALL_EX.map(ex=>({...ex,pr:getPR(ex.id),lastDate:getExHist(ex.id)[0]?.date||null})).filter(e=>e.pr>0).sort((a,b)=>b.pr-a.pr);

  // Trained muscles today
  const todayMuscles=new Set();
  ALL_EX.forEach(ex=>{if((all[ex.id]||[]).find(h=>h.date===todayKey()))todayMuscles.add(ex.muscle)});

  return(
    <div className="fu">
      {/* Gewicht */}
      <div className="card" style={{cursor:"pointer"}} onClick={()=>setShowBW(true)}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>

              <>
                <div style={{fontFamily:"'Syne',sans-serif",fontSize:26,fontWeight:800,color:"#38bdf8",letterSpacing:"-1px"}}>{bwHist[0].w}kg</div>
                <div style={{fontSize:10,color:"#555",marginTop:2}}>Laatste · {fmtDate(bwHist[0].date)}</div>
              </>
            ):<div style={{fontSize:13,color:"#555"}}>Tik om te loggen ⚖️</div>}
          </div>
          {spark.length>=2?<Sparkline data={spark} color="#38bdf8"/>:<div style={{fontSize:24}}>⚖️</div>}
        </div>
      </div>

      {/* Vandaag getraind */}
      <div className="card">
        <div className="lbl" style={{marginBottom:10}}>Vandaag getraind</div>
        {todayMuscles.size===0?<div style={{fontSize:12,color:"#444"}}>Nog niets gelogd vandaag</div>:(
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {[...todayMuscles].map(m=><div key={m} style={{fontSize:11,color:MUSCLE_COLORS[m],background:MUSCLE_COLORS[m]+"20",border:`1px solid ${MUSCLE_COLORS[m]}40`,padding:"4px 10px",borderRadius:7,textTransform:"capitalize"}}>{m}</div>)}
          </div>
        )}
      </div>

      {/* Volume */}
      <div className="card">
        <div className="lbl" style={{marginBottom:14}}>Volume deze week</div>
        <div style={{display:"flex",flexDirection:"column",gap:9}}>
          {muscles.map(m=>{
            const sets=volByMuscle[m]||0,target=TARGETS[m],p=Math.min(sets/target,1),c=MUSCLE_COLORS[m];
            return(
              <div key={m}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <div style={{fontSize:11,color:"#888",textTransform:"capitalize"}}>{m}</div>
                  <div style={{fontSize:10,color:p>=1?c:"#555"}}>{sets}/{target} sets {p>=1?"✓":""}</div>
                </div>
                <div style={{height:4,background:"#1e1e22",borderRadius:2}}><div style={{height:"100%",borderRadius:2,background:c,width:`${p*100}%`,transition:"width .6s ease"}}/></div>
              </div>
            );
          })}
        </div>
      </div>

      {/* PRs */}
      <div className="card">
        <div className="lbl" style={{marginBottom:14}}>Persoonlijke Records 🏆</div>
        {prs.length===0?<div style={{fontSize:12,color:"#444",textAlign:"center",padding:"16px 0"}}>Log je eerste sets om PRs bij te houden!</div>:(
          <div style={{display:"flex",flexDirection:"column",gap:7}}>
            {prs.map((ex,i)=>{
              const di=DAYS.findIndex(d=>WORKOUTS[d]?.find(e=>e.id===ex.id));
              const c=di>=0?DAY_COLORS[di]:"#555";
              return(
                <div key={ex.id} style={{display:"flex",alignItems:"center",gap:11,padding:"10px 13px",borderRadius:12,background:"#0d0d0f",border:`1px solid ${i===0?"#fbbf2430":"#1e1e22"}`}}>
                  <div style={{fontSize:16,width:22,textAlign:"center"}}>{i===0?"🥇":i===1?"🥈":i===2?"🥉":"·"}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12,color:"#e8e8e8",fontFamily:"'Syne',sans-serif",fontWeight:700}}>{ex.name}</div>
                    {ex.lastDate&&<div style={{fontSize:10,color:"#444",marginTop:1}}>{fmtDate(ex.lastDate)}</div>}
                  </div>
                  <div style={{fontSize:15,fontFamily:"'Syne',sans-serif",fontWeight:800,color:c}}>{ex.pr}kg</div>
                </div>
              );
            })}
          </div>
        )}
      </div>
      {showBW&&<BWModal onClose={()=>setShowBW(false)}/>}
    </div>
  );
}

// ─── CALENDAR TAB ─────────────────────────────────────────────────────────────
function CalendarTab(){
  const now=new Date();
  const [yr,setYr]=useState(now.getFullYear());
  const [mo,setMo]=useState(now.getMonth());
  const [calData,setCalData]=useState(()=>lsGet("pf_cal",{}));

  const monthName=new Date(yr,mo,1).toLocaleDateString("nl-NL",{month:"long",year:"numeric"});
  const firstDow=new Date(yr,mo,1).getDay();
  const offset=(firstDow+6)%7;
  const dim=new Date(yr,mo+1,0).getDate();
  const todayStr=now.toISOString().slice(0,10);

  function prevMo(){if(mo===0){setYr(y=>y-1);setMo(11)}else setMo(m=>m-1)}
  function nextMo(){if(mo===11){setYr(y=>y+1);setMo(0)}else setMo(m=>m+1)}
  function toggle(ds){
    if(new Date(ds)>now)return;
    const u={...calData,[ds]:!calData[ds]};
    setCalData(u);lsSet("pf_cal",u);
  }

  const moStr=`${yr}-${String(mo+1).padStart(2,"0")}`;
  const trainedCount=Object.entries(calData).filter(([k,v])=>v&&k.startsWith(moStr)).length;
  const daysPassed=yr===now.getFullYear()&&mo===now.getMonth()?now.getDate():dim;

  // Get muscles logged per day from exercise history
  const all=lsGet("pf_ex",{});
  const dayMuscles={};
  ALL_EX.forEach(ex=>{
    (all[ex.id]||[]).filter(h=>h.date.startsWith(moStr)).forEach(h=>{
      if(!dayMuscles[h.date])dayMuscles[h.date]=[];
      if(!dayMuscles[h.date].includes(ex.muscle))dayMuscles[h.date].push(ex.muscle);
    });
  });

  const cells=[];
  for(let i=0;i<offset;i++)cells.push(null);
  for(let i=1;i<=dim;i++)cells.push(i);

  return(
    <div className="fu">
      <div className="card">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <button onClick={prevMo} style={{border:"1px solid #2a2a2e",color:"#555",borderRadius:8,padding:"6px 13px",fontSize:15}}>‹</button>
          <div style={{fontFamily:"'Syne',sans-serif",fontSize:14,fontWeight:800,color:"#fff",textTransform:"capitalize"}}>{monthName}</div>
          <button onClick={nextMo} style={{border:"1px solid #2a2a2e",color:"#555",borderRadius:8,padding:"6px 13px",fontSize:15}}>›</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:6}}>
          {["M","D","W","D","V","Z","Z"].map((d,i)=><div key={i} style={{textAlign:"center",fontSize:9,color:"#555",padding:"3px 0"}}>{d}</div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
          {cells.map((day,i)=>{
            if(!day)return <div key={"e"+i}/>;
            const ds=`${yr}-${String(mo+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
            const trained=calData[ds]||dayMuscles[ds]?.length>0;
            const isToday=ds===todayStr;
            const isFuture=new Date(ds+T12)>now;
            const muscles=dayMuscles[ds]||[];
            const dc=muscles.length>0?(MUSCLE_COLORS[muscles[0]]||"#a3e635"):"#a3e635";
            return(
              <div key={ds} onClick={()=>toggle(ds)} style={{aspectRatio:"1",borderRadius:9,background:trained?"#a3e63515":"#1a1a1e",border:`1px solid ${isToday?"#a3e635":trained?"#a3e63535":"#2a2a2e"}`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:isFuture?"default":"pointer",gap:2,opacity:isFuture?0.25:1}}>
                <div style={{fontSize:10,color:isToday?"#a3e635":trained?"#e8e8e8":"#555",fontFamily:isToday?"'Syne',sans-serif":"inherit",fontWeight:isToday?800:400}}>{day}</div>
                {trained&&<div style={{width:4,height:4,borderRadius:"50%",background:dc}}/>}
              </div>
            );
          })}
        </div>
        <div style={{marginTop:14,display:"flex",justifyContent:"space-between"}}>
          <div style={{fontSize:11,color:"#555"}}>{trainedCount} dagen getraind</div>
          <div style={{fontSize:11,color:"#a3e635"}}>{Math.round(trainedCount/daysPassed*100)||0}% bijgehouden</div>
        </div>
      </div>
    </div>
  );
}

// Constant to avoid template literal issues
const T12="T12:00:00";

// ─── APP ──────────────────────────────────────────────────────────────────────
const TABS=[
  {id:"today",label:"Vandaag",
    icon:a=><svg width={20} height={20} viewBox="0 0 24 24" fill="none" stroke={a?"#a3e635":"#555"} strokeWidth={2} strokeLinecap="round"><rect x={3} y={4} width={18} height={18} rx={3}/><line x1={16} y1={2} x2={16} y2={6}/><line x1={8} y1={2} x2={8} y2={6}/><line x1={3} y1={10} x2={21} y2={10}/></svg>},
  {id:"stats",label:"Stats",
    icon:a=><svg width={20} height={20} viewBox="0 0 24 24" fill="none" stroke={a?"#38bdf8":"#555"} strokeWidth={2} strokeLinecap="round"><line x1={18} y1={20} x2={18} y2={10}/><line x1={12} y1={20} x2={12} y2={4}/><line x1={6} y1={20} x2={6} y2={14}/></svg>},
  {id:"calendar",label:"Kalender",
    icon:a=><svg width={20} height={20} viewBox="0 0 24 24" fill="none" stroke={a?"#f472b6":"#555"} strokeWidth={2} strokeLinecap="round"><rect x={3} y={4} width={18} height={18} rx={3}/><line x1={16} y1={2} x2={16} y2={6}/><line x1={8} y1={2} x2={8} y2={6}/><line x1={3} y1={10} x2={21} y2={10}/><line x1={8} y1={14} x2={8} y2={14} strokeWidth={3}/><line x1={12} y1={14} x2={12} y2={14} strokeWidth={3}/><line x1={16} y1={14} x2={16} y2={14} strokeWidth={3}/></svg>},
];
const ACTIVE_COLORS={today:"#a3e635",stats:"#38bdf8",calendar:"#f472b6"};

function App(){
  const [tab,setTab]=useState("today");
  return(
    <div className="app-shell">
      <div className="page">
        {tab==="today"&&<TodayTab/>}
        {tab==="stats"&&<StatsTab/>}
        {tab==="calendar"&&<CalendarTab/>}
      </div>
      <div className="tabbar">
        {TABS.map(t=>(
          <button key={t.id} className="tabbtn" onClick={()=>setTab(t.id)}>
            {t.icon(tab===t.id)}
            <div style={{fontSize:9,color:tab===t.id?ACTIVE_COLORS[t.id]:"#555",letterSpacing:".04em",textTransform:"uppercase"}}>{t.label}</div>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
