// ── STORAGE ───────────────────────────────────────────────────────────────────
const todayKey=()=>new Date().toISOString().slice(0,10);
const fmtDate=d=>new Date(d+"T12:00:00").toLocaleDateString("nl-NL",{day:"numeric",month:"short"});
function lsGet(k,fb=null){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb}catch{return fb}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}

function getExHistory(exId){
  const all=lsGet("fit_ex_v2",{});
  return(all[exId]||[]).sort((a,b)=>b.date.localeCompare(a.date));
}
function saveExSets(exId,sets){
  const all=lsGet("fit_ex_v2",{});
  if(!all[exId])all[exId]=[];
  all[exId]=[{date:todayKey(),sets},...all[exId].filter(e=>e.date!==todayKey())].slice(0,40);
  lsSet("fit_ex_v2",all);
}
function getTodaySets(exId){
  const h=getExHistory(exId);
  const t=h.find(x=>x.date===todayKey());
  return t?t.sets:null;
}
function getAllTimePR(exId){
  const hist=getExHistory(exId);
  let pr=0;
  hist.forEach(h=>h.sets.forEach(s=>{const w=parseFloat(s.weight)||0;if(w>pr)pr=w;}));
  return pr;
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function getYearPct(){
  const now=new Date();
  const start=new Date(now.getFullYear(),0,1);
  const end=new Date(now.getFullYear()+1,0,1);
  return((now-start)/(end-start)*100).toFixed(1);
}
function getDailyQuote(){
  const day=Math.floor((Date.now()-new Date(new Date().getFullYear(),0,1))/(86400000));
  return QUOTES[day%QUOTES.length];
}
let _actx=null;
function getActx(){
  if(!_actx)_actx=new(window.AudioContext||window.webkitAudioContext)();
  if(_actx.state==="suspended")_actx.resume();
  return _actx;
}
function playBeep(){
  try{
    const ctx=getActx();
    [0,180,360].forEach(delay=>{
      const o=ctx.createOscillator();
      const g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=900;o.type="sine";
      const t=ctx.currentTime+delay/1000;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.4,t+0.01);
      g.gain.linearRampToValueAtTime(0,t+0.22);
      o.start(t);o.stop(t+0.25);
    });
  }catch{}
}

// ── SPARKLINE ─────────────────────────────────────────────────────────────────
function Sparkline({data,color}){
  if(!data||data.length<2)return null;
  const max=Math.max(...data),min=Math.min(...data),range=max-min||1;
  const w=64,h=28;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-((v-min)/range)*(h-6)-3}`).join(" ");
  const last=pts.split(" ").pop().split(",");
  return(
    <svg width={w} height={h}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth={2} strokeLinejoin="round" strokeLinecap="round" opacity={0.9}/>
      <circle cx={last[0]} cy={last[1]} r={3} fill={color}/>
    </svg>
  );
}

function ExerciseModal({ex,dayColor,onClose}){

  const sparkData=[...hist].reverse().map(h=>Math.max(...h.sets.map(s=>parseFloat(s.weight)||0))).filter(v=>v>0);
  const maxEver=sparkData.length?Math.max(...sparkData):null;

  function handleSave(){
    const valid=sets.filter(s=>s.weight!==""||s.reps!=="");
    if(valid.length){
      const maxNew=Math.max(...valid.map(s=>parseFloat(s.weight)||0));
      if(maxNew>allTimePR&&allTimePR>0)setIsPR(true);
      saveExSets(ex.id,valid);

    setSaved(true);
    setTimeout(onClose,isPR?1200:600);

    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.82)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:200,backdropFilter:"blur(8px)"}}>

        <div style={{marginBottom:16}}>
          <div style={{fontFamily:"'Syne',sans-serif",fontSize:19,fontWeight:800,color:"#fff"}}>
            {ex.name}
            {allTimePR>0&&<span style={{fontSize:10,color:"#fbbf24",background:"#fbbf2415",border:"1px solid #fbbf2430",padding:"2px 7px",borderRadius:5,marginLeft:8,fontFamily:"'DM Mono',monospace"}}>PR {allTimePR}kg</span>}
          </div>
          <div style={{fontSize:11,color:"#555",marginTop:3}}>{[ex.detail,ex.sets].filter(Boolean).join(" · ")}</div>
        </div>

        <div style={{display:"flex",gap:6,marginBottom:18}}>
          {[["log","Log sets"],["history","Progressie"]].map(([t,label])=>(
            <button key={t} onClick={()=>setTab(t)} style={{flex:1,padding:"8px 0",borderRadius:10,background:tab===t?dayColor+"20":"#1a1a1e",border:`1px solid ${tab===t?dayColor+"60":"#2a2a2e"}`,color:tab===t?dayColor:"#555",fontSize:11,cursor:"pointer",textTransform:"uppercase",letterSpacing:"0.05em"}}>{label}</button>
          ))}
        </div>

        {tab==="log"?(
          <>
            {hist.length>0&&(
              <div style={{marginBottom:14,padding:"12px 14px",borderRadius:12,background:"#0d0d0f",border:"1px solid #1e1e22"}}>
                <div style={{fontSize:10,color:"#555",marginBottom:8}}>Vorige · {fmtDate(hist[0].date)}</div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {hist[0].sets.map((s,i)=>(
                    <div key={i} style={{fontSize:11,color:dayColor,background:dayColor+"18",padding:"4px 10px",borderRadius:7,fontFamily:"'DM Mono',monospace"}}>{s.weight}kg × {s.reps}</div>
                  ))}
                </div>
              </div>
            )}

            {isPR&&<div style={{marginBottom:14,padding:"12px 14px",borderRadius:12,background:"#fbbf2410",border:"1px solid #fbbf2440",textAlign:"center",fontSize:13,color:"#fbbf24",fontFamily:"'Syne',sans-serif",fontWeight:800}}>🏆 Nieuw PR!</div>}

            <div style={{display:"flex",gap:8,marginBottom:6,paddingLeft:28}}>
              <div style={{flex:2,fontSize:10,color:"#444",textAlign:"center",textTransform:"uppercase",letterSpacing:"0.08em"}}>kg</div>

            </div>
            <div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:12}}>
              {sets.map((s,idx)=>(
                <div key={idx} style={{display:"flex",alignItems:"center",gap:8}}>

              <div style={{color:"#444",fontSize:12,textAlign:"center",padding:"32px 0"}}>Nog geen sessies. Log je eerste sets!</div>

                      <div style={{fontFamily:"'Syne',sans-serif",fontSize:26,fontWeight:800,color:dayColor,letterSpacing:"-1px"}}>{maxEver}kg</div>
                      <div style={{fontSize:10,marginTop:3,color:sparkData[sparkData.length-1]>sparkData[0]?"#a3e635":"#f87171"}}>
                        {sparkData[sparkData.length-1]>sparkData[0]?`▲ +${(sparkData[sparkData.length-1]-sparkData[0]).toFixed(1)}kg`:`▼ ${(sparkData[sparkData.length-1]-sparkData[0]).toFixed(1)}kg`} sinds start

                    </div>

                        ))}
                      </div>

              </>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

// ── REST TIMER ────────────────────────────────────────────────────────────────
function RestTimer(){
  const PRESETS=[30,60,90,120];
  const [seconds,setSeconds]=useState(120);
  const [custom,setCustom]=useState(120);
  const [running,setRunning]=useState(false);
  const [done,setDone]=useState(false);
  const ref=useRef(null);

  useEffect(()=>{
    if(running&&seconds>0){ref.current=setInterval(()=>setSeconds(s=>s-1),1000);}
    else if(seconds===0){clearInterval(ref.current);setRunning(false);setDone(true);playBeep();}
    return()=>clearInterval(ref.current);
  },[running,seconds]);

  const pct=seconds/custom,r=44,circ=2*Math.PI*r;
  const color=done?"#a3e635":pct>0.5?"#38bdf8":pct>0.2?"#fb923c":"#f87171";

  return(
    <div className="card">
      <div className="label" style={{marginBottom:16}}>Rest Timer</div>
      <div style={{display:"flex",gap:6,marginBottom:18}}>
        {PRESETS.map(p=>(
          <button key={p} onClick={()=>{setCustom(p);setSeconds(p);setRunning(false);setDone(false);}} style={{flex:1,padding:"7px 0",borderRadius:9,background:custom===p?"#38bdf820":"#1a1a1e",border:`1px solid ${custom===p?"#38bdf860":"#2a2a2e"}`,color:custom===p?"#38bdf8":"#555",fontSize:10,cursor:"pointer"}}>
            {p<60?`${p}s`:`${p/60}min`}
          </button>
        ))}
      </div>
      <div style={{display:"flex",alignItems:"center",gap:20}}>
        <div style={{position:"relative",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <svg width={100} height={100} style={{transform:"rotate(-90deg)"}}>
            <circle cx={50} cy={50} r={r} fill="none" stroke="#1e1e22" strokeWidth={8}/>
            <circle cx={50} cy={50} r={r} fill="none" stroke={color} strokeWidth={8} strokeDasharray={`${pct*circ} ${circ}`} strokeLinecap="round" style={{transition:"stroke-dasharray 0.4s linear,stroke 0.4s ease"}}/>
          </svg>
          <div style={{position:"absolute",fontFamily:"'Syne',sans-serif",fontSize:20,fontWeight:800,color:done?"#a3e635":"#fff",letterSpacing:"-1px"}}>
            {done?"✓":`${Math.floor(seconds/60)}:${String(seconds%60).padStart(2,"0")}`}
          </div>
        </div>
        <div style={{flex:1,display:"flex",flexDirection:"column",gap:8}}>
          <div style={{display:"flex",gap:8}}>
            {!running
              ?<button onClick={()=>{try{getActx();}catch{}setDone(false);setRunning(true);}} style={{flex:1,padding:"10px 0",borderRadius:10,background:done?"#a3e63520":"#38bdf820",border:`1px solid ${done?"#a3e63550":"#38bdf850"}`,color:done?"#a3e635":"#38bdf8",fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:13,cursor:"pointer"}}>{done?"Again":seconds===custom?"Start":"Resume"}</button>
              :<button onClick={()=>setRunning(false)} style={{flex:1,padding:"10px 0",borderRadius:10,background:"#fb923c20",border:"1px solid #fb923c50",color:"#fb923c",fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:13,cursor:"pointer"}}>Pause</button>
            }
            <button onClick={()=>{clearInterval(ref.current);setRunning(false);setDone(false);setSeconds(custom);}} style={{padding:"10px 14px",borderRadius:10,background:"transparent",border:"1px solid #2a2a2e",color:"#555",fontSize:12,cursor:"pointer"}}>↺</button>
          </div>
          <div style={{fontSize:10,color:"#444"}}>{done?"Rest done — get back to it 💪":running?"Resting...":"Tap Start na je set"}</div>
        </div>
      </div>
    </div>
  );
}

// ── RING ──────────────────────────────────────────────────────────────────────
function Ring({pct,color,size=72,stroke=7}){
  const r=(size-stroke)/2,circ=2*Math.PI*r;
  return(
    <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#1e1e22" strokeWidth={stroke}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={`${Math.min(pct,1)*circ} ${circ}`} strokeLinecap="round" style={{transition:"stroke-dasharray 0.6s cubic-bezier(.4,0,.2,1)"}}/>
    </svg>
  );
}

// ── BODY WEIGHT MODAL ─────────────────────────────────────────────────────────
function BodyWeightModal({onClose}){
  const [weight,setWeight]=useState("");
  const [saved,setSaved]=useState(false);
  const history=lsGet("fit_bodyweight",[]);
  const recent=history.slice(0,14);
  const sparkData=[...recent].reverse().map(h=>h.w);

  function handleSave(){
    const w=parseFloat(weight);
    if(!w)return;
    const updated=[{date:todayKey(),w},...history.filter(h=>h.date!==todayKey())].slice(0,90);
    lsSet("fit_bodyweight",updated);
    setSaved(true);
    setTimeout(onClose,600);
  }

  const latest=history[0];
  const prev=history[1];
  const diff=latest&&prev?(latest.w-prev.w).toFixed(1):null;

  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.82)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:200,backdropFilter:"blur(8px)"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#141416",border:"1px solid #2a2a2e",borderRadius:"22px 22px 0 0",padding:"8px 20px 40px",width:"100%",maxWidth:480,maxHeight:"80vh",overflowY:"auto"}}>
        <div style={{width:36,height:4,background:"#2a2a2e",borderRadius:2,margin:"14px auto 20px"}}/>
        <div style={{fontFamily:"'Syne',sans-serif",fontSize:19,fontWeight:800,color:"#fff",marginBottom:20}}>Lichaamsgewicht</div>

        {latest&&(
          <div style={{marginBottom:16,padding:"16px",borderRadius:14,background:"#0d0d0f",border:"1px solid #1e1e22",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div>
              <div style={{fontSize:10,color:"#555",marginBottom:4}}>Laatste meting · {fmtDate(latest.date)}</div>
              <div style={{fontFamily:"'Syne',sans-serif",fontSize:28,fontWeight:800,color:"#38bdf8",letterSpacing:"-1px"}}>{latest.w}kg</div>
              {diff&&<div style={{fontSize:10,marginTop:2,color:parseFloat(diff)<0?"#a3e635":parseFloat(diff)>0?"#f87171":"#555"}}>{parseFloat(diff)>0?"+":""}{diff}kg vs vorige</div>}
            </div>
            {sparkData.length>=2&&<Sparkline data={sparkData} color="#38bdf8"/>}
          </div>
        )}

        <div style={{marginBottom:12}}>
          <input type="number" inputMode="decimal" placeholder="Gewicht in kg..." value={weight} onChange={e=>setWeight(e.target.value)}
            style={{width:"100%",background:"#1a1a1e",border:"1px solid #38bdf840",borderRadius:12,padding:"14px 16px",color:"#fff",fontSize:20,fontFamily:"'DM Mono',monospace",outline:"none",textAlign:"center"}}
          />
        </div>
        <button onClick={handleSave} style={{width:"100%",padding:"15px 0",borderRadius:13,background:saved?"#a3e635":"#38bdf8",color:"#000",border:"none",fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:15,cursor:"pointer",transition:"background 0.2s",marginBottom:20}}>{saved?"✓ Opgeslagen!":"Opslaan"}</button>

        {recent.length>1&&(
          <div>
            <div className="label" style={{marginBottom:12}}>Geschiedenis</div>
            <div style={{display:"flex",flexDirection:"column",gap:7}}>
              {recent.map((h,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",borderRadius:10,background:"#0d0d0f",border:`1px solid ${i===0?"#38bdf830":"#1e1e22"}`}}>
                  <div style={{fontSize:11,color:"#555"}}>{fmtDate(h.date)}</div>
                  <div style={{fontSize:13,color:i===0?"#38bdf8":"#888",fontFamily:"'DM Mono',monospace",fontWeight:500}}>{h.w}kg</div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App(){
  const today=new Date();
  const dayName=today.toLocaleDateString("nl-NL",{weekday:"long"});
  const dateStr=today.toLocaleDateString("nl-NL",{day:"numeric",month:"long"});
  const todayShort=today.toLocaleDateString("en-US",{weekday:"short"});
  const dayOfYear=Math.floor((today-new Date(today.getFullYear(),0,1))/86400000);

  const [splitIdx,setSplitIdx]=useState(()=>lsGet("fit_splitIdx",dayOfYear%4));
  const [restDay,setRestDay]=useState(false);
  const [exDone,setExDone]=useState(()=>lsGet(`fit_exDone_${todayKey()}`,{}));
  const [activeEx,setActiveEx]=useState(null);
  const [lastWeights,setLastWeights]=useState({});
  const [supps,setSupps]=useState(()=>lsGet(`fit_supps_${todayKey()}`,{}));
  const [sleepScore,setSleepScore]=useState(()=>lsGet(`fit_sleep_${todayKey()}`,null));
  const [weekDone,setWeekDone]=useState(()=>lsGet(`fit_week_${todayKey().slice(0,7)}`,{}));
  const [showWeekHistory,setShowWeekHistory]=useState(false);
  const [showBodyWeight,setShowBodyWeight]=useState(false);

  const SUPPLEMENTS=[
    {id:"creatine",label:"Creatine",dose:"5g"},
    {id:"vitd",label:"Vitamin D",dose:"2000IU"},
    {id:"omega3",label:"Omega-3",dose:"1–2 caps"},
    {id:"mag",label:"Magnesium + B6",dose:"before bed"},
  ];

  useEffect(()=>{lsSet("fit_splitIdx",splitIdx);},[splitIdx]);
  useEffect(()=>{lsSet(`fit_exDone_${todayKey()}`,exDone);},[exDone]);
  useEffect(()=>{lsSet(`fit_supps_${todayKey()}`,supps);},[supps]);
  useEffect(()=>{lsSet(`fit_sleep_${todayKey()}`,sleepScore);},[sleepScore]);
  useEffect(()=>{
    lsSet(`fit_week_${todayKey().slice(0,7)}`,weekDone);
    // save to history
    const hist=lsGet("fit_week_history",{});
    hist[todayKey().slice(0,7)]=weekDone;
    lsSet("fit_week_history",hist);
  },[weekDone]);

  const currentDayColor=DAY_COLORS[splitIdx];
  const exercises=WORKOUTS[DAYS[splitIdx]]||[];
  const doneCount=exercises.filter(e=>exDone[e.id]).length;
  const yearPct=getYearPct();
  const quote=getDailyQuote();
  const bodyWeightHistory=lsGet("fit_bodyweight",[]);
  const latestBW=bodyWeightHistory[0];
  const streak=useMemo(()=>{
    const hist=lsGet("fit_week_history",{});
    const weeks=Object.keys(hist).sort((a,b)=>b.localeCompare(a));
    let s=0;
    for(const wk of weeks){
      const cnt=Object.values(hist[wk]||{}).filter(Boolean).length;
      if(cnt>=3)s++;else break;
    }
    return s;
  },[weekDone]);

  function loadWeights(idx){
    const exs=WORKOUTS[DAYS[idx]]||[];
    const w={};
    exs.forEach(ex=>{
      const h=getExHistory(ex.id).filter(x=>x.date!==todayKey());
      if(h.length>0){
        const mx=Math.max(...h[0].sets.map(s=>parseFloat(s.weight)||0));
        if(mx>0)w[ex.id]=mx;
      }
    });
    setLastWeights(w);
  }
  useEffect(()=>{loadWeights(splitIdx);},[splitIdx]);

  const sleepOptions=[
    {key:"good",label:"Goed",emoji:"😴",color:"#a3e635"},
    {key:"ok",label:"Oké",emoji:"😐",color:"#fb923c"},
    {key:"bad",label:"Slecht",emoji:"😫",color:"#f87171"},
  ];

  return(
    <div style={{color:"#e8e8e8",fontFamily:"'DM Mono',monospace"}}>

      {/* ── HEADER ── */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
        <div>
          <div style={{fontFamily:"'Syne',sans-serif",fontSize:22,fontWeight:800,color:"#fff",letterSpacing:"-0.5px"}}>Hey Pim 👋</div>
          <div style={{color:"#555",fontSize:12,marginTop:3}}>{dayName} · {dateStr}</div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {streak>0&&<div style={{fontSize:10,color:"#fb923c",background:"#fb923c15",border:"1px solid #fb923c30",borderRadius:8,padding:"4px 10px"}}>🔥 {streak}w streak</div>}
          <button onClick={()=>setShowBodyWeight(true)} style={{background:"transparent",border:"1px solid #2a2a2e",color:"#555",borderRadius:8,padding:"6px 10px",fontSize:11,cursor:"pointer"}}>
            {latestBW?`${latestBW.w}kg`:"gewicht"}
          </button>
        </div>
      </div>

      {/* ── QUOTE + JAAR ── */}
      <div className="card" style={{background:"linear-gradient(135deg,#141416 0%,#1a1a1e 100%)"}}>
        <div style={{fontSize:13,color:"#e8e8e8",fontFamily:"'Syne',sans-serif",fontWeight:700,lineHeight:1.5,marginBottom:16,fontStyle:"italic"}}>
          "{quote}"
        </div>
        <div>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
            <div className="label">2026</div>
            <div style={{fontSize:10,color:"#a3e635"}}>{yearPct}%</div>
          </div>
          <div style={{height:3,background:"#1e1e22",borderRadius:2}}>
            <div style={{height:"100%",borderRadius:2,background:"linear-gradient(90deg,#a3e635,#38bdf8)",width:`${yearPct}%`,transition:"width 1s ease"}}/>
          </div>
        </div>
      </div>

      {/* ── WORKOUT ── */}
      <div className="card">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div className="label">Vandaag</div>
          <button onClick={()=>setRestDay(r=>!r)} style={{background:restDay?"#2a2a2e":"transparent",border:"1px solid #2a2a2e",color:restDay?"#a3e635":"#555",borderRadius:6,padding:"4px 10px",fontSize:10,cursor:"pointer"}}>
            {restDay?"✓ Rustdag":"Rustdag"}
          </button>
        </div>

        {!restDay?(
          <>
            <div style={{fontFamily:"'Syne',sans-serif",fontSize:28,fontWeight:800,color:currentDayColor,letterSpacing:"-1px",marginBottom:14}}>{DAYS[splitIdx]}</div>
            <div style={{display:"flex",gap:7,marginBottom:16}}>
              {DAYS.map((d,i)=>(
                <button key={d} onClick={()=>setSplitIdx(i)} style={{flex:1,padding:"8px 4px",borderRadius:10,background:i===splitIdx?DAY_COLORS[i]+"20":"#1a1a1e",border:`1px solid ${i===splitIdx?DAY_COLORS[i]+"60":"#2a2a2e"}`,color:i===splitIdx?DAY_COLORS[i]:"#444",fontSize:9,cursor:"pointer",letterSpacing:"0.05em",textTransform:"uppercase",whiteSpace:"pre-line"}}>{d.replace(" ","\n")}</button>
              ))}
            </div>
            <div style={{marginBottom:16}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                <div style={{fontSize:10,color:"#555"}}>voortgang</div>
                <div style={{fontSize:10,color:doneCount===exercises.length&&exercises.length>0?currentDayColor:"#555"}}>{doneCount}/{exercises.length}</div>
              </div>
              <div style={{height:3,background:"#1e1e22",borderRadius:2}}>
                <div style={{height:"100%",borderRadius:2,background:currentDayColor,width:`${exercises.length?(doneCount/exercises.length)*100:0}%`,transition:"width 0.4s ease"}}/>
              </div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {exercises.map(ex=>{
                const done=!!exDone[ex.id];
                const lw=lastWeights[ex.id];
                const pr=getAllTimePR(ex.id);
                return(
                  <div key={ex.id} style={{display:"flex",alignItems:"center",gap:10,padding:"11px 12px",borderRadius:12,background:done?currentDayColor+"08":"#0d0d0f",border:`1px solid ${done?currentDayColor+"30":"#1e1e22"}`,transition:"all 0.15s ease"}}>
                    <div onClick={()=>setExDone(p=>({...p,[ex.id]:!p[ex.id]}))} style={{minWidth:20,height:20,borderRadius:6,border:`1.5px solid ${done?currentDayColor:"#3a3a40"}`,background:done?currentDayColor:"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#000",fontWeight:700,flexShrink:0,cursor:"pointer"}}>{done?"✓":""}</div>
                    <div style={{flex:1,cursor:"pointer"}} onClick={()=>setActiveEx(ex)}>
                      <div style={{fontSize:12,color:done?"#555":"#e8e8e8",fontFamily:"'Syne',sans-serif",fontWeight:700,textDecoration:done?"line-through":"none"}}>
                        {ex.name}
                        {pr>0&&lw===pr&&<span style={{fontSize:9,color:"#fbbf24",marginLeft:5}}>🏆</span>}
                      </div>
                      <div style={{fontSize:10,color:"#3a3a40",marginTop:2}}>
                        {[ex.detail,ex.sets].filter(Boolean).join(" · ")}
                        {lw&&<span style={{color:currentDayColor+"90"}}> · {lw}kg</span>}
                      </div>
                    </div>
                    <button onClick={()=>setActiveEx(ex)} style={{padding:"5px 11px",borderRadius:8,flexShrink:0,background:"transparent",border:`1px solid ${currentDayColor}35`,color:currentDayColor+"cc",fontSize:10,cursor:"pointer"}}>log</button>
                  </div>
                );
              })}
            </div>
          </>
        ):(
          <div style={{color:"#555",fontFamily:"'Syne',sans-serif",fontSize:20,fontWeight:700}}>Rest & Recover 💤</div>
        )}
      </div>

      {/* ── WEEK ── */}
      <div className="card">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div className="label">Week</div>
          <button onClick={()=>setShowWeekHistory(true)} style={{background:"transparent",border:"1px solid #2a2a2e",color:"#555",borderRadius:6,padding:"4px 10px",fontSize:10,cursor:"pointer"}}>geschiedenis</button>
        </div>
        <div style={{display:"flex",gap:6}}>
          {WEEK.map(d=>{
            const isToday=d===todayShort,done=weekDone[d];
            return(
              <div key={d} onClick={()=>setWeekDone(w=>({...w,[d]:!w[d]}))} style={{flex:1,aspectRatio:"1",borderRadius:10,background:done?"#a3e63520":"#1a1a1e",border:`1px solid ${isToday?"#a3e635":done?"#a3e63540":"#2a2a2e"}`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",gap:3}}>
                <div style={{fontSize:8,color:isToday?"#a3e635":"#444"}}>{d}</div>
                <div style={{fontSize:14}}>{done?"✓":"·"}</div>
              </div>
            );
          })}
        </div>
      </div>

      {/* ── REST TIMER ── */}
      <RestTimer/>

      {/* ── SLAAP ── */}
      <div className="card">
        <div className="label" style={{marginBottom:14}}>Slaap</div>
        <div style={{display:"flex",gap:8}}>
          {sleepOptions.map(o=>(
            <button key={o.key} onClick={()=>setSleepScore(o.key)} style={{flex:1,padding:"14px 8px",borderRadius:12,background:sleepScore===o.key?o.color+"20":"#0d0d0f",border:`1px solid ${sleepScore===o.key?o.color+"60":"#1e1e22"}`,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:6,transition:"all 0.15s ease"}}>
              <div style={{fontSize:22}}>{o.emoji}</div>
              <div style={{fontSize:10,color:sleepScore===o.key?o.color:"#555",letterSpacing:"0.05em"}}>{o.label}</div>
            </button>
          ))}
        </div>
      </div>

      {/* ── SUPPLEMENTEN ── */}
      <div className="card">
        <div className="label" style={{marginBottom:14}}>Supplementen</div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {SUPPLEMENTS.map(s=>{
            const done=!!supps[s.id];
            return(
              <div key={s.id} onClick={()=>setSupps(p=>({...p,[s.id]:!p[s.id]}))} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 14px",borderRadius:12,background:done?"#a3e63508":"#0d0d0f",border:`1px solid ${done?"#a3e63530":"#1e1e22"}`,cursor:"pointer",transition:"all 0.15s ease"}}>
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <div style={{width:20,height:20,borderRadius:6,border:`1.5px solid ${done?"#a3e635":"#3a3a40"}`,background:done?"#a3e635":"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#000"}}>{done?"✓":""}</div>
                  <div>
                    <div style={{fontSize:13,color:done?"#e8e8e8":"#888",fontFamily:"'Syne',sans-serif",fontWeight:700}}>{s.label}</div>
                    <div style={{fontSize:10,color:"#444"}}>{s.dose}</div>
                  </div>
                </div>
                <div style={{width:6,height:6,borderRadius:"50%",background:done?"#a3e635":"#2a2a2e"}}/>
              </div>
            );
          })}
        </div>
        <div style={{marginTop:12,padding:"9px 14px",borderRadius:10,background:"#0d0d0f",border:"1px solid #1e1e22"}}>
          <div style={{fontSize:10,color:"#555"}}>{Object.values(supps).filter(Boolean).length}/{SUPPLEMENTS.length} genomen vandaag</div>
        </div>
      </div>

      {/* ── MODALS ── */}
      {activeEx&&<ExerciseModal ex={activeEx} dayColor={currentDayColor} onClose={()=>{setActiveEx(null);loadWeights(splitIdx);}}/>}
      {showWeekHistory&&<WeekHistoryModal onClose={()=>setShowWeekHistory(false)}/>}
      {showBodyWeight&&<BodyWeightModal onClose={()=>setShowBodyWeight(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
