// ─── STORAGE ─────────────────────────────────────────────────────────────────
const todayKey = () => new Date().toISOString().slice(0, 10);
const fmtDate = (d) => new Date(d + "T12:00:00").toLocaleDateString("nl-NL", { day: "numeric", month: "short" });

function lsGet(key, fallback = null) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; }
}
function lsSet(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

function getExHistory(exId) {
  const all = lsGet("fit_ex_history", {});
  return (all[exId] || []).sort((a, b) => b.date.localeCompare(a.date));
}
function saveExSets(exId, sets) {
  const all = lsGet("fit_ex_history", {});
  if (!all[exId]) all[exId] = [];
  const filtered = all[exId].filter(e => e.date !== todayKey());
  all[exId] = [{ date: todayKey(), sets }, ...filtered].slice(0, 30);
  lsSet("fit_ex_history", all);
}
function getTodaySets(exId) {
  const hist = getExHistory(exId);
  const today = hist.find(h => h.date === todayKey());
  return today ? today.sets : null;
}

// ─── SPARKLINE ────────────────────────────────────────────────────────────────
function Sparkline({ data, color }) {
  if (!data || data.length < 2) return null;
  const max = Math.max(...data), min = Math.min(...data), range = max - min || 1;
  const w = 64, h = 28;
  const pts = data.map((v, i) => `${(i / (data.length - 1)) * w},${h - ((v - min) / range) * (h - 6) - 3}`).join(" ");
  const last = pts.split(" ").pop().split(",");
  return (
    <svg width={w} height={h}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth={2} strokeLinejoin="round" strokeLinecap="round" opacity={0.9} />
      <circle cx={last[0]} cy={last[1]} r={3} fill={color} />
    </svg>
  );
}

// ─── EXERCISE MODAL ───────────────────────────────────────────────────────────
function ExerciseModal({ ex, dayColor, onClose }) {
  const prev = getExHistory(ex.id).filter(h => h.date !== todayKey());
  const todaySaved = getTodaySets(ex.id);
  const [sets, setSets] = useState(todaySaved || [{ weight: "", reps: "" }, { weight: "", reps: "" }, { weight: "", reps: "" }]);
  const [tab, setTab] = useState("log");
  const [saved, setSaved] = useState(false);

  const sparkData = [...prev].reverse().map(h => Math.max(...h.sets.map(s => parseFloat(s.weight) || 0))).filter(v => v > 0);
  const maxEver = sparkData.length ? Math.max(...sparkData) : null;

  function handleSave() {
    const valid = sets.filter(s => s.weight !== "" || s.reps !== "");
    if (valid.length) saveExSets(ex.id, valid);
    setSaved(true);
    setTimeout(onClose, 600);
  }

    <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.82)", display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 200, backdropFilter: "blur(8px)" }}>

        </div>
        <div style={{ display: "flex", gap: 6, marginBottom: 18 }}>
          {[["log", "Log sets"], ["history", "Progressie"]].map(([t, label]) => (
            <button key={t} onClick={() => setTab(t)} style={{ flex: 1, padding: "8px 0", borderRadius: 10, background: tab === t ? dayColor + "20" : "#1a1a1e", border: `1px solid ${tab === t ? dayColor + "60" : "#2a2a2e"}`, color: tab === t ? dayColor : "#555", fontFamily: "'DM Mono', monospace", fontSize: 11, cursor: "pointer", textTransform: "uppercase", letterSpacing: "0.05em" }}>{label}</button>
          ))}
        </div>

        {tab === "log" ? (
          <>
            {prev.length > 0 && (
              <div style={{ marginBottom: 14, padding: "12px 14px", borderRadius: 12, background: "#0d0d0f", border: "1px solid #1e1e22" }}>
                <div style={{ fontSize: 10, color: "#555", marginBottom: 8 }}>Vorige sessie · {fmtDate(prev[0].date)}</div>
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                  {prev[0].sets.map((s, i) => (
                    <div key={i} style={{ fontSize: 11, color: dayColor, background: dayColor + "18", padding: "4px 10px", borderRadius: 7, fontFamily: "'DM Mono', monospace" }}>{s.weight}kg × {s.reps}</div>
                  ))}
                </div>
              </div>

            <div style={{ display: "flex", gap: 8, marginBottom: 6, paddingLeft: 28 }}>
              <div style={{ flex: 2, fontSize: 10, color: "#444", textAlign: "center", textTransform: "uppercase", letterSpacing: "0.08em" }}>kg</div>
              <div style={{ flex: 2, fontSize: 10, color: "#444", textAlign: "center", textTransform: "uppercase", letterSpacing: "0.08em" }}>reps</div>
              <div style={{ width: 28 }} />
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 7, marginBottom: 12 }}>
              {sets.map((s, idx) => (
                <div key={idx} style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <div style={{ fontSize: 11, color: "#444", fontFamily: "'DM Mono', monospace", width: 20, textAlign: "right", flexShrink: 0 }}>{idx + 1}</div>

                    onChange={e => setSets(ss => ss.map((x, i) => i === idx ? { ...x, reps: e.target.value } : x))}
                    style={{ flex: 2, background: "#1a1a1e", border: `1px solid ${s.reps ? dayColor + "50" : "#2a2a2e"}`, borderRadius: 9, padding: "11px 8px", color: "#fff", fontSize: 16, fontFamily: "'DM Mono', monospace", outline: "none", textAlign: "center" }}

                  <button onClick={() => sets.length > 1 && setSets(ss => ss.filter((_, i) => i !== idx))} style={{ width: 28, height: 28, borderRadius: 7, background: "transparent", border: "1px solid #2a2a2e", color: "#444", fontSize: 13, cursor: "pointer", flexShrink: 0 }}>×</button>

                        {sparkData[sparkData.length - 1] > sparkData[0] ? `▲ +${(sparkData[sparkData.length - 1] - sparkData[0]).toFixed(1)}kg` : `▼ ${(sparkData[sparkData.length - 1] - sparkData[0]).toFixed(1)}kg`} sinds start

                    </div>

// ─── REST TIMER ───────────────────────────────────────────────────────────────
function RestTimer() {
  const [seconds, setSeconds] = useState(120);
  const [custom, setCustom] = useState(120);
  const [running, setRunning] = useState(false);
  const [done, setDone] = useState(false);
  const ref = useRef(null);

  useEffect(() => {
    if (running && seconds > 0) { ref.current = setInterval(() => setSeconds(s => s - 1), 1000); }
    else if (seconds === 0) { clearInterval(ref.current); setRunning(false); setDone(true); }
    return () => clearInterval(ref.current);
  }, [running, seconds]);

  const pct = seconds / custom, r = 44, circ = 2 * Math.PI * r;
  const color = done ? "#a3e635" : pct > 0.5 ? "#38bdf8" : pct > 0.2 ? "#fb923c" : "#f87171";

  return (
    <div style={{ background: "#111113", border: "1px solid #1e1e22", borderRadius: 16, padding: "20px", marginBottom: 16 }}>
      <div style={{ fontSize: 11, color: "#555", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 16 }}>Rest Timer</div>
      <div style={{ display: "flex", gap: 6, marginBottom: 18 }}>
        {[60, 90, 120, 180].map(p => (
          <button key={p} onClick={() => { setCustom(p); setSeconds(p); setRunning(false); setDone(false); }} style={{ flex: 1, padding: "6px 0", borderRadius: 8, background: custom === p ? "#38bdf820" : "#1a1a1e", border: `1px solid ${custom === p ? "#38bdf860" : "#2a2a2e"}`, color: custom === p ? "#38bdf8" : "#555", fontSize: 10, fontFamily: "'DM Mono', monospace", cursor: "pointer" }}>{p < 60 ? `${p}s` : `${p / 60}min`}</button>
        ))}
      </div>
      <div style={{ display: "flex", alignItems: "center", gap: 20 }}>
        <div style={{ position: "relative", display: "flex", alignItems: "center", justifyContent: "center" }}>
          <svg width={100} height={100} style={{ transform: "rotate(-90deg)" }}>
            <circle cx={50} cy={50} r={r} fill="none" stroke="#1e1e22" strokeWidth={8} />
            <circle cx={50} cy={50} r={r} fill="none" stroke={color} strokeWidth={8} strokeDasharray={`${pct * circ} ${circ}`} strokeLinecap="round" style={{ transition: "stroke-dasharray 0.4s linear, stroke 0.4s ease" }} />
          </svg>
          <div style={{ position: "absolute", fontFamily: "'Syne', sans-serif", fontSize: 20, fontWeight: 800, color: done ? "#a3e635" : "#fff", letterSpacing: "-1px" }}>
            {done ? "✓" : `${Math.floor(seconds / 60)}:${String(seconds % 60).padStart(2, "0")}`}
          </div>
        </div>
        <div style={{ flex: 1, display: "flex", flexDirection: "column", gap: 8 }}>
          <div style={{ display: "flex", gap: 8 }}>
            {!running
              ? <button onClick={() => { setDone(false); setRunning(true); }} style={{ flex: 1, padding: "10px 0", borderRadius: 10, background: done ? "#a3e63520" : "#38bdf820", border: `1px solid ${done ? "#a3e63550" : "#38bdf850"}`, color: done ? "#a3e635" : "#38bdf8", fontFamily: "'Syne', sans-serif", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>{done ? "Again" : seconds === custom ? "Start" : "Resume"}</button>
              : <button onClick={() => setRunning(false)} style={{ flex: 1, padding: "10px 0", borderRadius: 10, background: "#fb923c20", border: "1px solid #fb923c50", color: "#fb923c", fontFamily: "'Syne', sans-serif", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>Pause</button>
            }
            <button onClick={() => { clearInterval(ref.current); setRunning(false); setDone(false); setSeconds(custom); }} style={{ padding: "10px 14px", borderRadius: 10, background: "transparent", border: "1px solid #2a2a2e", color: "#555", fontFamily: "'DM Mono', monospace", fontSize: 12, cursor: "pointer" }}>↺</button>
          </div>
          <div style={{ fontSize: 10, color: "#444" }}>{done ? "Rest done — get back to it 💪" : running ? "Resting..." : "Tap Start after your set"}</div>
        </div>
      </div>
    </div>
  );
}

// ─── RING ─────────────────────────────────────────────────────────────────────
function Ring({ pct, color, size = 72, stroke = 7 }) {
  const r = (size - stroke) / 2, circ = 2 * Math.PI * r;
  return (
    <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#1e1e22" strokeWidth={stroke} />
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={`${Math.min(pct, 1) * circ} ${circ}`} strokeLinecap="round" style={{ transition: "stroke-dasharray 0.6s cubic-bezier(.4,0,.2,1)" }} />
    </svg>
  );
}

// ─── MACRO MODAL ─────────────────────────────────────────────────────────────
function MacroModal({ macro, current, onSave, onClose }) {

        <div style={{ fontFamily: "'Syne', sans-serif", fontSize: 18, color: macro.color, fontWeight: 700 }}>Log {macro.label}</div>
        <div style={{ color: "#666", fontSize: 12 }}>Doel: {macro.target}{macro.unit} · Nu: {current}{macro.unit}</div>
        <input autoFocus type="number" inputMode="decimal" placeholder={`Voeg ${macro.unit} toe...`} value={val} onChange={e => setVal(e.target.value)}
          style={{ background: "#1e1e22", border: `1px solid ${macro.color}44`, borderRadius: 10, padding: "12px 14px", color: "#fff", fontSize: 18, fontFamily: "'DM Mono', monospace", outline: "none" }} />
        <button onClick={() => { onSave(Number(val)); onClose(); }} style={{ background: macro.color, color: "#000", border: "none", borderRadius: 10, padding: "13px 0", fontFamily: "'Syne', sans-serif", fontWeight: 700, fontSize: 15, cursor: "pointer" }}>Toevoegen</button>
      </div>
    </div>
  );
}

  // Persist state
  useEffect(() => { lsSet("fit_splitIdx", splitIdx); }, [splitIdx]);
  useEffect(() => { lsSet(`fit_exDone_${todayKey()}`, exDone); }, [exDone]);
  useEffect(() => { lsSet(`fit_macros_${todayKey()}`, macros); }, [macros]);
  useEffect(() => { lsSet(`fit_supps_${todayKey()}`, supps); }, [supps]);
  useEffect(() => { lsSet(`fit_sleep_${todayKey()}`, sleep); }, [sleep]);
  useEffect(() => { lsSet(`fit_week_${todayKey().slice(0, 7)}`, weekDone); }, [weekDone]);

  const currentDayColor = DAY_COLORS[splitIdx];
  const exercises = WORKOUTS[DAYS[splitIdx]] || [];
  const doneCount = exercises.filter(e => exDone[e.id]).length;
  const totalPct = MACROS.reduce((acc, m) => acc + Math.min(macros[m.key] / m.target, 1), 0) / MACROS.length;

  function loadWeights(idx) {
    const exs = WORKOUTS[DAYS[idx]] || [];
    const weights = {};
    exs.forEach(ex => {
      const hist = getExHistory(ex.id).filter(h => h.date !== todayKey());
      if (hist.length > 0) {
        const maxW = Math.max(...hist[0].sets.map(s => parseFloat(s.weight) || 0));
        if (maxW > 0) weights[ex.id] = maxW;
      }
    });
    setLastWeights(weights);
  }

  useEffect(() => { loadWeights(splitIdx); }, [splitIdx]);

  return (
    <div style={{ color: "#e8e8e8", fontFamily: "'DM Mono', monospace" }}>

      {/* Header */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 28 }}>
        <div>
          <div style={{ fontFamily: "'Syne', sans-serif", fontSize: 22, fontWeight: 800, color: "#fff", letterSpacing: "-0.5px" }}>Hey Pim 👋</div>
          <div style={{ color: "#555", fontSize: 12, marginTop: 3 }}>{dayName} · {dateStr}</div>
        </div>
        <button onClick={() => { const fresh = { kcal: 0, protein: 0, carbs: 0, fat: 0 }; setMacros(fresh); setSupps({}); lsSet(`fit_macros_${todayKey()}`, fresh); lsSet(`fit_supps_${todayKey()}`, {}); }}
          style={{ background: "transparent", border: "1px solid #2a2a2e", color: "#555", borderRadius: 8, padding: "6px 12px", fontSize: 11, fontFamily: "'DM Mono', monospace", cursor: "pointer" }}>reset dag</button>
      </div>

      {/* Workout card */}
      <div style={{ background: "#111113", border: "1px solid #1e1e22", borderRadius: 16, padding: "20px", marginBottom: 16 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
          <div style={{ fontSize: 11, color: "#555", letterSpacing: "0.1em", textTransform: "uppercase" }}>Vandaag</div>
          <button onClick={() => setRestDay(r => !r)} style={{ background: restDay ? "#2a2a2e" : "transparent", border: "1px solid #2a2a2e", color: restDay ? "#a3e635" : "#555", borderRadius: 6, padding: "4px 10px", fontSize: 10, fontFamily: "'DM Mono', monospace", cursor: "pointer" }}>
            {restDay ? "✓ Rustdag" : "Rustdag"}
          </button>
        </div>

        {!restDay ? (
          <>
            <div style={{ fontFamily: "'Syne', sans-serif", fontSize: 28, fontWeight: 800, color: currentDayColor, letterSpacing: "-1px", marginBottom: 14 }}>{DAYS[splitIdx]}</div>
            <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
              {DAYS.map((d, i) => (
                <button key={d} onClick={() => setSplitIdx(i)} style={{ flex: 1, padding: "8px 4px", borderRadius: 10, background: i === splitIdx ? DAY_COLORS[i] + "20" : "#1a1a1e", border: `1px solid ${i === splitIdx ? DAY_COLORS[i] + "60" : "#2a2a2e"}`, color: i === splitIdx ? DAY_COLORS[i] : "#444", fontSize: 9, fontFamily: "'DM Mono', monospace", cursor: "pointer", letterSpacing: "0.05em", textTransform: "uppercase", whiteSpace: "pre-line" }}>{d.replace(" ", "\n")}</button>
              ))}
            </div>
            <div style={{ marginBottom: 16 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                <div style={{ fontSize: 10, color: "#555" }}>voortgang</div>
                <div style={{ fontSize: 10, color: doneCount === exercises.length && exercises.length > 0 ? currentDayColor : "#555" }}>{doneCount}/{exercises.length}</div>
              </div>
              <div style={{ height: 3, background: "#1e1e22", borderRadius: 2 }}>
                <div style={{ height: "100%", borderRadius: 2, background: currentDayColor, width: `${exercises.length ? (doneCount / exercises.length) * 100 : 0}%`, transition: "width 0.4s ease" }} />
              </div>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              {exercises.map(ex => {
                const done = !!exDone[ex.id];
                const lw = lastWeights[ex.id];
                return (
                  <div key={ex.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "11px 12px", borderRadius: 12, background: done ? currentDayColor + "08" : "#0d0d0f", border: `1px solid ${done ? currentDayColor + "30" : "#1e1e22"}`, transition: "all 0.15s ease" }}>
                    <div onClick={() => setExDone(p => ({ ...p, [ex.id]: !p[ex.id] }))} style={{ minWidth: 20, height: 20, borderRadius: 6, border: `1.5px solid ${done ? currentDayColor : "#3a3a40"}`, background: done ? currentDayColor : "transparent", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, color: "#000", fontWeight: 700, flexShrink: 0, cursor: "pointer" }}>{done ? "✓" : ""}</div>
                    <div style={{ flex: 1, cursor: "pointer" }} onClick={() => setActiveEx(ex)}>
                      <div style={{ fontSize: 12, color: done ? "#555" : "#e8e8e8", fontFamily: "'Syne', sans-serif", fontWeight: 700, textDecoration: done ? "line-through" : "none" }}>{ex.name}</div>
                      <div style={{ fontSize: 10, color: "#3a3a40", marginTop: 2 }}>
                        {[ex.detail, ex.sets].filter(Boolean).join(" · ")}
                        {lw && <span style={{ color: currentDayColor + "90" }}> · {lw}kg</span>}
                      </div>
                    </div>
                    <button onClick={() => setActiveEx(ex)} style={{ padding: "5px 11px", borderRadius: 8, flexShrink: 0, background: "transparent", border: `1px solid ${currentDayColor}35`, color: currentDayColor + "cc", fontSize: 10, fontFamily: "'DM Mono', monospace", cursor: "pointer" }}>log</button>
                  </div>
                );
              })}
            </div>
          </>
        ) : (
          <div style={{ color: "#555", fontFamily: "'Syne', sans-serif", fontSize: 20, fontWeight: 700 }}>Rest & Recover 💤</div>
        )}
      </div>

      {/* Week */}
      <div style={{ background: "#111113", border: "1px solid #1e1e22", borderRadius: 16, padding: "16px 20px", marginBottom: 16 }}>
        <div style={{ fontSize: 11, color: "#555", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 12 }}>Week</div>
        <div style={{ display: "flex", gap: 6 }}>
          {WEEK.map(d => {
            const isToday = d === todayShort, done = weekDone[d];
            return (
              <div key={d} onClick={() => setWeekDone(w => ({ ...w, [d]: !w[d] }))} style={{ flex: 1, aspectRatio: "1", borderRadius: 10, background: done ? "#a3e63520" : "#1a1a1e", border: `1px solid ${isToday ? "#a3e635" : done ? "#a3e63540" : "#2a2a2e"}`, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", cursor: "pointer", gap: 3 }}>
                <div style={{ fontSize: 8, color: isToday ? "#a3e635" : "#444" }}>{d}</div>
                <div style={{ fontSize: 14 }}>{done ? "✓" : "·"}</div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Rest Timer */}
      <RestTimer />

      {/* Macros */}
      <div style={{ background: "#111113", border: "1px solid #1e1e22", borderRadius: 16, padding: "20px", marginBottom: 16 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <div style={{ fontSize: 11, color: "#555", letterSpacing: "0.1em", textTransform: "uppercase" }}>Voeding</div>
          <div style={{ fontSize: 11, color: "#a3e635" }}>{Math.round(totalPct * 100)}% van doel</div>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
          {MACROS.map(m => {
            const val = macros[m.key], pct = val / m.target;
            return (
              <div key={m.key} onClick={() => setActiveMacro(m)} style={{ background: "#0d0d0f", border: "1px solid #1e1e22", borderRadius: 14, padding: "16px", display: "flex", flexDirection: "column", alignItems: "center", gap: 8, cursor: "pointer" }}>
                <div style={{ position: "relative", display: "flex", alignItems: "center", justifyContent: "center" }}>
                  <Ring pct={pct} color={m.color} />
                  <div style={{ position: "absolute", fontFamily: "'Syne', sans-serif", fontSize: 13, fontWeight: 700, color: pct >= 1 ? m.color : "#fff" }}>{Math.round(pct * 100)}%</div>
                </div>
                <div style={{ textAlign: "center" }}>
                  <div style={{ fontSize: 10, color: m.color, letterSpacing: "0.08em", textTransform: "uppercase" }}>{m.label}</div>
                  <div style={{ fontSize: 12, color: "#888", marginTop: 2 }}>{val}<span style={{ color: "#444" }}>/{m.target}{m.unit}</span></div>
                </div>
              </div>
            );
          })}
        </div>
        <div style={{ textAlign: "center", color: "#444", fontSize: 10, marginTop: 12 }}>tik op een kaart om te loggen</div>
      </div>

      {/* Sleep */}
      <div style={{ background: "#111113", border: "1px solid #1e1e22", borderRadius: 16, padding: "20px", marginBottom: 16 }}>
        <div style={{ fontSize: 11, color: "#555", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 14 }}>Slaap</div>
        <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
          <div style={{ fontFamily: "'Syne', sans-serif", fontSize: 36, fontWeight: 800, color: sleep >= 7.5 ? "#a3e635" : sleep >= 6 ? "#fb923c" : "#f87171", letterSpacing: "-2px", minWidth: 80 }}>{sleep}h</div>
          <div style={{ flex: 1 }}>
            <input type="range" min={3} max={10} step={0.5} value={sleep} onChange={e => setSleep(Number(e.target.value))} style={{ width: "100%", cursor: "pointer" }} />
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, color: "#444", marginTop: 6 }}>
              <span>3h</span>
              <span style={{ color: sleep >= 7.5 ? "#a3e635" : "#555" }}>{sleep >= 7.5 ? "🟢 Goed" : sleep >= 6 ? "🟡 Oké" : "🔴 Te weinig"}</span>
              <span>10h</span>
            </div>
          </div>
        </div>
      </div>

      {/* Supplements */}
      <div style={{ background: "#111113", border: "1px solid #1e1e22", borderRadius: 16, padding: "20px" }}>
        <div style={{ fontSize: 11, color: "#555", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 14 }}>Supplementen</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {SUPPLEMENTS.map(s => {
            const done = !!supps[s.id];
            return (
              <div key={s.id} onClick={() => setSupps(p => ({ ...p, [s.id]: !p[s.id] }))} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 14px", borderRadius: 12, background: done ? "#a3e63508" : "#0d0d0f", border: `1px solid ${done ? "#a3e63530" : "#1e1e22"}`, cursor: "pointer", transition: "all 0.15s ease" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <div style={{ width: 20, height: 20, borderRadius: 6, border: `1.5px solid ${done ? "#a3e635" : "#3a3a40"}`, background: done ? "#a3e635" : "transparent", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, color: "#000" }}>{done ? "✓" : ""}</div>
                  <div>
                    <div style={{ fontSize: 13, color: done ? "#e8e8e8" : "#888", fontFamily: "'Syne', sans-serif", fontWeight: 700 }}>{s.label}</div>
                    <div style={{ fontSize: 10, color: "#444" }}>{s.dose}</div>
                  </div>
                </div>
                <div style={{ width: 6, height: 6, borderRadius: "50%", background: done ? "#a3e635" : "#2a2a2e" }} />
              </div>
            );
          })}
        </div>
        <div style={{ marginTop: 14, padding: "10px 14px", borderRadius: 10, background: "#0d0d0f", border: "1px solid #1e1e22" }}>
          <div style={{ fontSize: 10, color: "#555" }}>{Object.values(supps).filter(Boolean).length}/{SUPPLEMENTS.length} genomen vandaag</div>
        </div>
      </div>

      {/* Modals */}
      {activeEx && <ExerciseModal ex={activeEx} dayColor={currentDayColor} onClose={() => { setActiveEx(null); loadWeights(splitIdx); }} />}
      {activeMacro && <MacroModal macro={activeMacro} current={macros[activeMacro.key]} onSave={val => { const updated = { ...macros, [activeMacro.key]: Math.min(macros[activeMacro.key] + val, activeMacro.target * 2) }; setMacros(updated); }} onClose={() => setActiveMacro(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
